name: Deploy to EC2

on:
    push:
        branches: ["main"]
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            # --- BUILD ---
            - name: Set up JDK 17
              uses: actions/setup-java@v3
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: maven

            - name: Build with Maven
              run: |
                  chmod +x mvnw
                  ./mvnw clean package -DskipTests

            # --- DEPLOY WAR ---
            - name: Deploy WAR to EC2
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  source: "target/medicalstore-0.0.1-SNAPSHOT.war"
                  target: "/tmp/medicalstore-deploy"
                  strip_components: 1

            # --- DEPLOY KAFKA SETUP SCRIPT ---
            - name: Deploy Kafka setup script
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  source: "scripts/setup-kafka-ec2.sh"
                  target: "/tmp/medicalstore-deploy"
                  strip_components: 1

            # --- CONFIGURE EC2 & RESTART ---
            - name: Configure EC2 & Restart
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      echo "════════════════════════════════════════════"
                      echo "  Starting Deployment (Free Tier EC2)"
                      echo "════════════════════════════════════════════"

                      # ── Step 1: Install Kafka (idempotent — skips if already installed)
                      echo "Setting up Kafka (KRaft mode, no Zookeeper)..."
                      chmod +x /tmp/medicalstore-deploy/setup-kafka-ec2.sh
                      sudo bash /tmp/medicalstore-deploy/setup-kafka-ec2.sh

                      # ── Step 2: Start Kafka broker
                      echo "Starting Kafka broker..."
                      sudo systemctl start kafka || true
                      sleep 5  # Wait for Kafka to be ready

                      # ── Step 3: Stop app, deploy new WAR
                      echo "Updating Medicalstore App..."
                      sudo systemctl stop medicalstore-backend || true

                      sudo mkdir -p /opt/medicalstore
                      sudo rm -rf /opt/medicalstore/app.war
                      sudo cp /tmp/medicalstore-deploy/medicalstore-0.0.1-SNAPSHOT.war /opt/medicalstore/app.war

                      # ── Step 4: Create medicalstore-backend systemd service (idempotent)
                      echo "Creating medicalstore-backend systemd service..."
                      sudo tee /etc/systemd/system/medicalstore-backend.service > /dev/null <<'EOF'
                      [Unit]
                      Description=MedicalStore Backend
                      Documentation=https://github.com/Kt129673/medicalstore
                      After=network.target kafka.service
                      Wants=kafka.service

                      [Service]
                      Type=simple
                      User=ec2-user
                      WorkingDirectory=/opt/medicalstore

                      # Database credentials and Kafka/JVM settings are in systemd drop-ins:
                      # /etc/systemd/system/medicalstore-backend.service.d/db.conf
                      # /etc/systemd/system/medicalstore-backend.service.d/kafka.conf
                      ExecStart=/bin/bash -c 'exec java $JAVA_OPTS -jar /opt/medicalstore/app.war'
                      SuccessExitStatus=143

                      Restart=on-failure
                      RestartSec=15
                      StandardOutput=journal
                      StandardError=journal
                      SyslogIdentifier=medicalstore-backend

                      [Install]
                      WantedBy=multi-user.target
                      EOF

                      # Write DB credentials drop-in only when secrets are provided
                      # (avoids setting empty env vars that override Spring Boot defaults)
                      DB_URL_VAL='${{ secrets.DB_URL }}'
                      if [ -n "$DB_URL_VAL" ]; then
                        sudo mkdir -p /etc/systemd/system/medicalstore-backend.service.d
                        printf '[Service]\nEnvironment="DB_URL=%s"\nEnvironment="DB_USERNAME=%s"\nEnvironment="DB_PASSWORD=%s"\n' \
                          '${{ secrets.DB_URL }}' '${{ secrets.DB_USERNAME }}' '${{ secrets.DB_PASSWORD }}' \
                          | sudo tee /etc/systemd/system/medicalstore-backend.service.d/db.conf > /dev/null
                      else
                        echo "  ⚠️  DB_URL secret not set — app will use Spring Boot default datasource URL"
                      fi

                      sudo systemctl daemon-reload
                      sudo systemctl enable medicalstore-backend

                      # ── Step 5: Open port 8081 on OS firewall (idempotent)
                      echo "Opening port 8081 on OS firewall..."
                      sudo firewall-cmd --zone=public --add-port=8081/tcp --permanent 2>/dev/null && sudo firewall-cmd --reload 2>/dev/null || true
                      sudo ufw allow 8081/tcp 2>/dev/null || true

                      # ── Step 6: Start app (Kafka env vars set by setup script)
                      echo "Starting Medicalstore..."
                      sudo systemctl start medicalstore-backend

                      # ── Step 7: Health check — wait up to 90 s for the app to be ready
                      echo "Waiting for application to start..."
                      RETRIES=18
                      WAIT=5
                      for i in $(seq 1 $RETRIES); do
                        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/actuator/health || true)
                        if [ "$STATUS" = "200" ]; then
                          echo "  ✅ Health check passed (attempt $i)"
                          break
                        fi
                        if [ "$i" -eq "$RETRIES" ]; then
                          echo "  ❌ Application did not start in time. Last HTTP status: $STATUS"
                          echo "--- Last 50 log lines ---"
                          sudo journalctl -u medicalstore-backend -n 50 --no-pager || true
                          exit 1
                        fi
                        echo "  Attempt $i/$RETRIES — status $STATUS, retrying in ${WAIT}s..."
                        sleep $WAIT
                      done

                      # ── Step 8: Cleanup
                      rm -rf /tmp/medicalstore-deploy

                      # Fetch public IP via IMDSv2 for the success banner
                      IMDS_TOKEN=$(curl -X PUT -H 'X-aws-ec2-metadata-token-ttl-seconds: 21600' \
                        -s http://169.254.169.254/latest/api/token 2>/dev/null || true)
                      PUBLIC_IP=$(curl -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" \
                        -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || echo '<EC2-PUBLIC-IP>')

                      echo ""
                      echo "════════════════════════════════════════════"
                      echo "  ✅ Deployment Success!"
                      echo "  Kafka:  localhost:9092 (KRaft mode)"
                      echo "  App:    http://${PUBLIC_IP}:8081"
                      echo "  Cost:   \$0 (Free Tier)"
                      echo "════════════════════════════════════════════"
