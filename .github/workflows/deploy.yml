name: Deploy to EC2

on:
    push:
        branches: ["main"]
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            # --- BUILD ---
            - name: Set up JDK 17
              uses: actions/setup-java@v3
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: maven

            - name: Build with Maven
              run: |
                  chmod +x mvnw
                  ./mvnw clean package -DskipTests

            # --- DEPLOYMENT ---
            - name: Deploy WAR to EC2
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  source: "target/medicalstore-0.0.1-SNAPSHOT.war"
                  target: "/tmp/medicalstore-deploy"
                  strip_components: 1

            - name: Configure EC2 & Restart
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      echo "Starting Deployment..."

                      # Stop previous application
                      echo "Stopping existing application..."
                      PID=$(ps -ef | grep 'java -jar app.war' | grep -v grep | awk '{print $2}')
                      if [ -n "$PID" ]; then
                        echo "Killing process $PID..."
                        sudo kill -9 $PID || true
                      fi
                      sleep 2

                      # Remove previous deployment
                      echo "Removing previous deployment files..."
                      sudo rm -rf /opt/medicalstore
                      sudo mkdir -p /opt/medicalstore

                      # Update Application
                      echo "Copying new application file..."
                      sudo cp /tmp/medicalstore-deploy/medicalstore-0.0.1-SNAPSHOT.war /opt/medicalstore/app.war

                      # Run Application (Simple Nohup Deployment)
                      echo "Starting services..."
                      cd /opt/medicalstore
                      sudo bash -c "nohup java -jar app.war > app.log 2>&1 < /dev/null &"
                      
                      # Wait for startup to complete (25 seconds) to catch delayed crashes
                      sleep 25

                      echo "--- STARTUP LOGS (LAST 80 LINES) ---"
                      cat /opt/medicalstore/app.log || true
                      echo "--------------------"

                      # Cleanup
                      rm -rf /tmp/medicalstore-deploy

                      echo "Deployment Success!"
