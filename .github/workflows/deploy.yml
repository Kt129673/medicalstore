name: Deploy to EC2

on:
    push:
        branches: ["main"]
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            # --- BUILD ---
            - name: Set up JDK 17
              uses: actions/setup-java@v3
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: maven

            - name: Build with Maven
              run: |
                  chmod +x mvnw
                  ./mvnw clean package -DskipTests

            # --- DEPLOY WAR ---
            - name: Deploy WAR to EC2
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  source: "target/medicalstore-0.0.1-SNAPSHOT.war"
                  target: "/tmp/medicalstore-deploy"
                  strip_components: 1

            # --- DEPLOY KAFKA SETUP SCRIPT ---
            - name: Deploy Kafka setup script
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  source: "scripts/setup-kafka-ec2.sh"
                  target: "/tmp/medicalstore-deploy"
                  strip_components: 1

            # --- CONFIGURE EC2 & RESTART ---
            - name: Configure EC2 & Restart
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      echo "════════════════════════════════════════════"
                      echo "  Starting Deployment (Free Tier EC2)"
                      echo "════════════════════════════════════════════"

                      # ── Step 1: Install Kafka (idempotent — skips if already installed)
                      echo "Setting up Kafka (KRaft mode, no Zookeeper)..."
                      chmod +x /tmp/medicalstore-deploy/setup-kafka-ec2.sh
                      sudo bash /tmp/medicalstore-deploy/setup-kafka-ec2.sh

                      # ── Step 2: Start Kafka broker
                      echo "Starting Kafka broker..."
                      sudo systemctl start kafka || true
                      sleep 5  # Wait for Kafka to be ready

                      # ── Step 3: Stop app, deploy new WAR
                      echo "Updating Medicalstore App..."
                      sudo systemctl stop medicalstore-backend || true

                      sudo mkdir -p /opt/medicalstore
                      sudo rm -rf /opt/medicalstore/app.war
                      sudo cp /tmp/medicalstore-deploy/medicalstore-0.0.1-SNAPSHOT.war /opt/medicalstore/app.war

                      # ── Step 4: Create medicalstore-backend systemd service (idempotent)
                      echo "Creating medicalstore-backend systemd service..."
                      sudo tee /etc/systemd/system/medicalstore-backend.service > /dev/null <<'EOF'
                      [Unit]
                      Description=MedicalStore Backend
                      Documentation=https://github.com/Kt129673/medicalstore
                      After=network.target kafka.service
                      Wants=kafka.service

                      [Service]
                      Type=simple
                      User=ec2-user
                      WorkingDirectory=/opt/medicalstore

                      # Kafka and JVM settings are in the drop-in:
                      # /etc/systemd/system/medicalstore-backend.service.d/kafka.conf
                      ExecStart=/bin/bash -c 'exec java $JAVA_OPTS -jar /opt/medicalstore/app.war'
                      SuccessExitStatus=143

                      Restart=on-failure
                      RestartSec=15
                      StandardOutput=journal
                      StandardError=journal
                      SyslogIdentifier=medicalstore-backend

                      [Install]
                      WantedBy=multi-user.target
                      EOF

                      sudo systemctl daemon-reload
                      sudo systemctl enable medicalstore-backend

                      # ── Step 5: Start app (Kafka env vars set by setup script)
                      echo "Starting Medicalstore..."
                      sudo systemctl start medicalstore-backend

                      # ── Step 6: Cleanup
                      rm -rf /tmp/medicalstore-deploy

                      echo ""
                      echo "════════════════════════════════════════════"
                      echo "  ✅ Deployment Success!"
                      echo "  Kafka:  localhost:9092 (KRaft mode)"
                      echo "  App:    port 8081"
                      echo "  Cost:   $0 (Free Tier)"
                      echo "════════════════════════════════════════════"
