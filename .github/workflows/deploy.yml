name: Deploy to EC2

on:
    push:
        branches: ["main"]
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            # --- BUILD ---
            - name: Set up JDK 17
              uses: actions/setup-java@v3
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: maven

            - name: Build with Maven
              run: |
                  chmod +x mvnw
                  ./mvnw clean package -DskipTests

            # --- DEPLOYMENT ---
            - name: Deploy WAR to EC2
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  source: "target/medicalstore-0.0.1-SNAPSHOT.war"
                  target: "/tmp/medicalstore-deploy"
                  strip_components: 1

            - name: Configure EC2 & Restart
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      # --- ENTERPRISE DEPLOYMENT ---
                      echo "Starting Enterprise Deployment..."

                      APP_DIR="/opt/medicalstore"
                      SERVICE_FILE="/etc/systemd/system/medicalstore-backend.service"

                      # 1. Ensure directory exists
                      sudo mkdir -p $APP_DIR

                      # 2. Stop existing service gracefully
                      if systemctl list-unit-files | grep -q medicalstore-backend; then
                          echo "Stopping existing service..."
                          sudo systemctl stop medicalstore-backend || true
                      fi

                      # 3. Backup previous version (Enterprise standard)
                      if [ -f "$APP_DIR/app.war" ]; then
                          echo "Backing up previous version..."
                          sudo mv $APP_DIR/app.war $APP_DIR/app_backup_$(date +%s).war
                          
                          # Keep only the last 3 backups to save space
                          sudo ls -dt $APP_DIR/app_backup_*.war | tail -n +4 | sudo xargs -I {} rm -- {} || true
                      fi

                      # 4. Copy new build & set permissions
                      echo "Deploying new version..."
                      sudo cp /tmp/medicalstore-deploy/medicalstore-0.0.1-SNAPSHOT.war $APP_DIR/app.war
                      sudo chmod 755 $APP_DIR/app.war

                      # 5. Create SystemD Service File
                      echo "Configuring SystemD daemon..."
                      sudo bash -c "cat > $SERVICE_FILE" << 'EOF'
                      [Unit]
                      Description=MedicalStore Spring Boot Application
                      After=syslog.target network.target

                      [Service]
                      User=root
                      Restart=always
                      RestartSec=10
                      WorkingDirectory=/opt/medicalstore
                      ExecStart=/usr/bin/java -Xms256m -Xmx512m -jar /opt/medicalstore/app.war
                      SuccessExitStatus=143
                      StandardOutput=append:/opt/medicalstore/app.log
                      StandardError=append:/opt/medicalstore/app.log

                      [Install]
                      WantedBy=multi-user.target
                      EOF

                      # 6. Reload SystemD & Start Service
                      echo "Starting Enterprise Service..."
                      sudo systemctl daemon-reload
                      sudo systemctl enable medicalstore-backend
                      sudo systemctl start medicalstore-backend

                      # 7. Health Check
                      sleep 15
                      echo "--- SERVICE STATUS ---"
                      sudo systemctl status medicalstore-backend --no-pager || true

                      echo "--- STARTUP LOGS (TAIL) ---"
                      sudo tail -n 50 $APP_DIR/app.log || true

                      # 8. Cleanup Temp Files
                      rm -rf /tmp/medicalstore-deploy

                      echo "Deployment Success!"
