<div class="login-container">
  <div class="login-card">
    <h2>Medical Store Management</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          id="username" 
          type="text" 
          formControlName="username" 
          placeholder="Enter username"
          class="form-control"
        />
        <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error">
          Username is required
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="Enter password"
          class="form-control"
        />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
          Password must be at least 6 characters
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
      

      <div class="button-group">
        <button type="submit" [disabled]="loginForm.invalid || loading" class="btn btn-primary">
          {{ loading ? 'Loading...' : 'Login' }}
        </button>
        <button type="button" (click)="onRegister()" [disabled]="loginForm.invalid || loading" class="btn btn-secondary">
          Register
        </button>
      </div>
    </form>
  </div>
</div>
