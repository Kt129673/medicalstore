spring.application.name=medicalstore

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medicalstore_db?useSSL=true&requireSSL=true&serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool (tuned for remote AWS RDS)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Hibernate 2nd-level cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Hibernate Batch Inserts & Optimizations (Performance)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Spring Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

# Thymeleaf Configuration (cache ON for production performance)
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static resource caching (1 year)
spring.web.resources.cache.period=31536000
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Compression disabled — gzip on Tomcat causes ERR_INCOMPLETE_CHUNKED_ENCODING
# when a mid-render exception aborts the gzip stream before the final chunk is sent.
# Re-enable only if a reverse proxy (nginx) handles compression externally.
server.compression.enabled=false

# Server Configuration
server.port=8081

# Session timeout (30 minutes of inactivity)
server.servlet.session.timeout=30m

# Error handling — never expose stack traces to clients
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Twilio Configuration
twilio.account.sid=YOUR_ACCOUNT_SID
twilio.auth.token=YOUR_AUTH_TOKEN
twilio.phone.number=+14155238886
twilio.whatsapp.enabled=true
# ─── Scheduled Job Tuning ──────────────────────────────────────────────────
# Days ahead to consider a medicine "expiring soon" (Job 1 – daily 06:00)
scheduler.expiry-alert-days=30
# Days after soft-deletion before a user record is hard-deleted (Job 3 – weekly Sunday 03:00)
scheduler.soft-delete-retention-days=90