<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Process Return', page='returns', content=~{::#content}, pageIcon='bi bi-arrow-return-left')}">

<body>
    <div id="content">
        <!-- Page Header -->
        <div class="page-header mb-4">
            <div>
                <h2>
                    <i class="bi bi-arrow-return-left text-danger"></i> Process Return/Refund
                </h2>
                <p class="text-muted mb-0">Process a product return and issue refund</p>
            </div>
            <a href="/returns" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to Returns
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/returns/save}" th:object="${returnItem}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label ent-required">Select Sold Item</label>
                            <select class="form-control" th:field="*{saleItem.id}" id="saleSelect" required
                                onchange="updateSaleDetails()">
                                <option value="">Choose Sold Item</option>
                                <th:block th:each="sale : ${sales}">
                                    <option th:each="item : ${sale.items}" th:value="${item.id}"
                                        th:text="'INV-' + ${#strings.padLeft(sale.id.toString(), 6, '0')} + ' - ' + ${item.medicine != null ? item.medicine.name : 'Deleted Item'} + ' (Qty: ' + ${item.quantity} + ')'"
                                        th:attr="data-saleid=${sale.id},data-medicine=${item.medicine != null ? item.medicine.name : ''},data-quantity=${item.quantity},data-unitprice=${item.unitPrice}">
                                    </option>
                                </th:block>
                            </select>
                            <input type="hidden" th:field="*{sale.id}" id="saleIdHidden">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Medicine</label>
                            <input type="text" class="form-control" id="medicineName" readonly>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Sold Quantity</label>
                            <input type="number" class="form-control" id="soldQuantity" readonly>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label ent-required">Return Quantity</label>
                            <input type="number" class="form-control" th:field="*{returnQuantity}" id="returnQuantity"
                                required min="1" onchange="calculateRefund()">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Unit Price</label>
                            <input type="number" step="0.01" class="form-control" id="unitPrice" readonly>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label ent-required">Refund Amount (₹)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{refundAmount}"
                                id="refundAmount" required readonly
                                style="font-size: 1.2rem; font-weight: bold; background-color: #fff3cd;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label ent-required">Return Reason</label>
                            <select class="form-control" th:field="*{reason}" required>
                                <option value="">Select Reason</option>
                                <option value="Expired Medicine">Expired Medicine</option>
                                <option value="Damaged Product">Damaged Product</option>
                                <option value="Wrong Medicine">Wrong Medicine</option>
                                <option value="Customer Request">Customer Request</option>
                                <option value="Side Effects">Side Effects</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" rows="3" th:field="*{notes}"
                            placeholder="Additional notes about the return..."></textarea>
                    </div>

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> <strong>Note:</strong> Processing this return will
                        automatically restore the stock quantity.
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-arrow-return-left"></i> Process Return
                        </button>
                        <a href="/returns" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function updateSaleDetails() {
                const select = document.getElementById('saleSelect');
                const option = select.options[select.selectedIndex];

                if (option.value) {
                    document.getElementById('saleIdHidden').value = option.getAttribute('data-saleid');
                    document.getElementById('medicineName').value = option.getAttribute('data-medicine');
                    document.getElementById('soldQuantity').value = option.getAttribute('data-quantity');
                    document.getElementById('unitPrice').value = option.getAttribute('data-unitprice');

                    // Set max return quantity
                    const soldQty = parseInt(option.getAttribute('data-quantity'));
                    document.getElementById('returnQuantity').max = soldQty;

                    calculateRefund();
                }
            }

            function calculateRefund() {
                const returnQty = parseFloat(document.getElementById('returnQuantity').value) || 0;
                const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
                const refundAmount = returnQty * unitPrice;
                document.getElementById('refundAmount').value = refundAmount.toFixed(2);
            }
        </script>
    </div>
</body>

</html>
