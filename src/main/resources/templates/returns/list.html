<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Returns', page='returns', content=~{::#content}, pageIcon='bi bi-arrow-return-left')}">

<body>
    <div id="content">

        <!-- Read-Only Monitoring Mode: shown to ADMIN drilling down into operations -->
        <div sec:authorize="hasRole('ADMIN')"
             class="alert alert-info d-flex align-items-center gap-2 mb-3" role="alert">
            <i class="bi bi-eye-fill fs-5 flex-shrink-0"></i>
            <div>
                <strong>Read-Only Monitoring Mode.</strong>
                You are viewing operational data as Platform Admin. Write operations are restricted to Shopkeeper.
            </div>
        </div>

        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Returns & Refunds', 'Process and track product returns', 'bi bi-arrow-return-left', '/returns/new', 'Process Return', null)}">
        </div>

        <!-- Returns Table -->
        <div class="card modern-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-list-ul"></i> All Returns</h5>
                <span class="badge bg-primary ent-row-count" th:unless="${#lists.isEmpty(returns)}" th:text="${#lists.size(returns)} + ' Total'">0 Total</span>
            </div>
            <div class="card-body">
                <th:block th:if="${#lists.isEmpty(returns)}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-emoji-smile text-success opacity-75', 'Zero returns?', 'Your customers must be really happy!', null, null)}">
                    </div>
                </th:block>
                <div th:unless="${#lists.isEmpty(returns)}" class="table-responsive">
                    <table class="modern-table table table-animate-rows table-sticky-right">
                        <thead>
                            <tr>
                                <th>Return ID</th>
                                <th>Date</th>
                                <th>Invoice #</th>
                                <th>Medicine</th>
                                <th>Quantity</th>
                                <th>Refund Amount</th>
                                <th>Reason</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="retSkeletonBody" aria-hidden="true">
                            <tr class="ent-skeleton--row" th:each="i : ${#numbers.sequence(1,5)}">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:80px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:110px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:90px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:120px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:40px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:70px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:80px;"></span></td>
                                <td class="text-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></td>
                            </tr>
                        </tbody>
                        <tbody id="retTableBody" style="display:none">
                            <tr th:each="returnItem : ${returns}">
                                <td th:text="'RET-' + ${#strings.padLeft(returnItem.id.toString(), 5, '0')}">RET-00001
                                </td>
                                <td th:text="${#temporals.format(returnItem.returnDate, 'dd-MM-yyyy HH:mm')}">17-11-2025
                                </td>
                                <td>
                                    <a th:href="@{/sales/invoice/{id}(id=${returnItem.sale.id})}"
                                        class="text-decoration-none text-primary fw-semibold" target="_blank"
                                        th:text="'INV-' + ${#strings.padLeft(returnItem.sale.id.toString(), 6, '0')}">
                                        INV-000001
                                    </a>
                                </td>
                                <td th:text="${returnItem.saleItem != null and returnItem.saleItem.medicine != null ? returnItem.saleItem.medicine.name : 'Deleted Item'}">Medicine</td>
                                <td><span class="badge bg-warning text-dark" th:text="${returnItem.returnQuantity}">1</span></td>
                                <td class="fw-bold text-danger"
                                    th:text="'₹' + ${#numbers.formatDecimal(returnItem.refundAmount, 0, 2)}">₹100.00
                                </td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${returnItem.reason}">Expired</span>
                                </td>
                                <td class="text-end">
                                    <div sec:authorize="hasRole('ADMIN')">
                                        <form th:action="@{/returns/delete/{id}(id=${returnItem.id})}" method="post"
                                            style="display:inline"
                                            data-confirm-delete="Cancel this return? The stock adjustment will be reversed.">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Cancel Return">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light fw-bold">
                            <tr>
                                <td colspan="5" class="text-end">Total Refunded:</td>
                                <td class="text-danger">
                                    ₹<span th:text="${#numbers.formatDecimal(returns.stream().mapToDouble(r -> r.refundAmount).sum(), 0, 2)}">0.00</span>
                                </td>
                                <td colspan="2"></td>
                            </tr>
                        </tfoot>
                    </table>                </div>
                <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var sk = document.getElementById('retSkeletonBody');
                    var rb = document.getElementById('retTableBody');
                    if (!sk || !rb) return;
                    setTimeout(function () { sk.style.display = 'none'; rb.style.display = ''; }, 230);
                });
                </script>                </div>
            </div>
        </div>
    </div>
</body>

</html>
