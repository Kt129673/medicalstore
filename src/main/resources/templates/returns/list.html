<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Returns', page='returns', content=~{::#content}, pageIcon='bi bi-arrow-return-left')}">

<body>
    <div id="content">
        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Returns & Refunds', 'Process and track product returns', 'bi bi-arrow-return-left', '/returns/new', 'Process Return', null)}">
        </div>

        <!-- Returns Table -->
        <div class="card">
            <div class="card-body">
                <th:block th:if="${returns.isEmpty()}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-inbox', 'No Returns Yet', 'No returns processed yet', null, null)}">
                    </div>
                </th:block>
                <div th:unless="${returns.isEmpty()}" class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Return ID</th>
                                <th>Date</th>
                                <th>Invoice #</th>
                                <th>Medicine</th>
                                <th>Quantity</th>
                                <th>Refund Amount</th>
                                <th>Reason</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="returnItem : ${returns}">
                                <td th:text="'RET-' + ${#strings.padLeft(returnItem.id.toString(), 5, '0')}">RET-00001
                                </td>
                                <td th:text="${#temporals.format(returnItem.returnDate, 'dd-MM-yyyy HH:mm')}">17-11-2025
                                </td>
                                <td th:text="'INV-' + ${#strings.padLeft(returnItem.sale.id.toString(), 6, '0')}">
                                    INV-000001</td>
                                <td th:text="${returnItem.sale.medicine.name}">Medicine</td>
                                <td><span class="badge bg-warning" th:text="${returnItem.returnQuantity}">1</span></td>
                                <td class="fw-bold text-danger"
                                    th:text="'₹' + ${#numbers.formatDecimal(returnItem.refundAmount, 0, 2)}">₹100.00
                                </td>
                                <td th:text="${returnItem.reason}">Expired</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
