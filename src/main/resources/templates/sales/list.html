<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Sales', page='sales', content=~{::#content}, pageIcon='bi bi-cart-check-fill')}">

<body>
    <div id="content">

        <style>
            .sale-amount {
                font-weight: 700;
                color: #059669;
                font-size: 16px;
            }

            .payment-badge {
                font-weight: 600;
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.75rem;
            }

            .payment-cash {
                background: #d1fae5;
                color: #059669;
            }

            .payment-card {
                background: #dbeafe;
                color: #2563eb;
            }

            .payment-upi {
                background: #e0e7ff;
                color: #4f46e5;
            }

            .transaction-icon {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                background: linear-gradient(135deg, #667eea, #764ba2);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 16px;
                margin-right: 10px;
            }

            .customer-type {
                font-size: 0.7rem;
                padding: 2px 8px;
                border-radius: 4px;
                background: #f1f5f9;
                color: #64748b;
            }
        </style>
        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Sales History', 'View and manage all sales transactions', 'bi bi-receipt text-primary', '/sales/new', 'New Sale', null)}">
        </div>

        <!-- Sales Table -->
        <div class="card modern-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> All Transactions
                </h5>
                <span class="badge bg-primary" th:text="${salePage.totalElements} + ' Sales'">0 Sales</span>
            </div>
            <div class="card-body">
                <th:block th:if="${salePage.isEmpty()}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-cart-x', 'No Sales Yet', 'Start recording sales to track your business', '/sales/new', 'Make First Sale')}">
                    </div>
                </th:block>

                <!-- Table -->
                <div th:unless="${salePage.isEmpty()}" class="table-responsive">
                    <table class="modern-table table">
                        <thead>
                            <tr>
                                <th><i class="bi bi-calendar-event"></i> Date & Time</th>
                                <th><i class="bi bi-capsule"></i> Items</th>
                                <th><i class="bi bi-person"></i> Customer</th>
                                <th><i class="bi bi-box"></i> Total Qty</th>
                                <th><i class="bi bi-currency-rupee"></i> Final Amount</th>
                                <th><i class="bi bi-credit-card"></i> Payment</th>
                                <th class="text-end"><i class="bi bi-tools"></i> Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="sale : ${salePage.content}">
                                <td>
                                    <div style="display: flex; flex-direction: column;">
                                        <span style="font-weight: 600;"
                                            th:text="${#temporals.format(sale.saleDate, 'dd MMM yyyy')}"></span>
                                        <small class="text-muted"
                                            th:text="${#temporals.format(sale.saleDate, 'hh:mm a')}"></small>
                                    </div>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="transaction-icon">
                                            <i class="bi bi-cart"></i>
                                        </div>
                                        <div>
                                            <span th:if="${sale.items.size() > 0}"
                                                th:text="${sale.items[0].medicine.name}"></span>
                                            <span th:if="${sale.items.size() == 0}">No items</span>
                                            <small th:if="${sale.items.size() > 1}" class="text-muted d-block"
                                                th:text="'+ ' + ${sale.items.size() - 1} + ' more'"></small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${sale.customer != null}" th:text="${sale.customer.name}"></span>
                                    <span th:unless="${sale.customer != null}" class="customer-type">
                                        <i class="bi bi-person-walking"></i> Walk-in
                                    </span>
                                </td>
                                <td>
                                    <span class="badge bg-secondary"
                                        th:text="${#aggregates.sum(sale.items.![quantity]) ?: 0} + ' units'"></span>
                                </td>
                                <td>
                                    <span class="sale-amount"
                                        th:text="'₹' + ${#numbers.formatDecimal(sale.finalAmount != null ? sale.finalAmount : sale.totalAmount, 0, 2)}"></span>
                                </td>
                                <td>
                                    <span th:class="'payment-badge payment-' + ${sale.paymentMethod.toLowerCase()}"
                                        th:text="${sale.paymentMethod}">
                                    </span>
                                </td>
                                <td class="text-end">
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/sales/invoice/{id}(id=${sale.id})}"
                                            class="btn btn-sm btn-outline-primary" target="_blank" title="View Invoice">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/sales/pdf/{id}(id=${sale.id})}"
                                            class="btn btn-sm btn-outline-danger" title="Download PDF">
                                            <i class="bi bi-file-pdf"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div th:if="${salePage.totalPages > 1}"
                    class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4">
                    <div class="text-muted small mb-2 mb-md-0">
                        Showing <span class="fw-medium" th:text="${salePage.number * salePage.size + 1}"></span> to
                        <span class="fw-medium"
                            th:text="${(salePage.number + 1) * salePage.size < salePage.totalElements ? (salePage.number + 1) * salePage.size : salePage.totalElements}"></span>
                        of <span class="fw-medium" th:text="${salePage.totalElements}"></span> entries
                    </div>
                    <nav aria-label="Sales pagination">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${salePage.first} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/sales(page=${salePage.number - 1}, size=${salePage.size})}"><i
                                        class="bi bi-chevron-left"></i></a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, salePage.totalPages - 1)}"
                                th:classappend="${salePage.number == i} ? 'active'"
                                th:if="${i >= salePage.number - 2 and i <= salePage.number + 2}">
                                <a class="page-link" th:href="@{/sales(page=${i}, size=${salePage.size})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${salePage.last} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/sales(page=${salePage.number + 1}, size=${salePage.size})}"><i
                                        class="bi bi-chevron-right"></i></a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
