<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Sales', page='sales', content=~{::#content}, pageIcon='bi bi-cart-check-fill')}">

<body>
    <div id="content">

        <!-- Read-Only Monitoring Mode: shown to ADMIN drilling down into operations -->
        <div sec:authorize="hasRole('ADMIN')"
             class="alert alert-info d-flex align-items-center gap-2 mb-3" role="alert">
            <i class="bi bi-eye-fill fs-5 flex-shrink-0"></i>
            <div>
                <strong>Read-Only Monitoring Mode.</strong>
                You are viewing operational data as Platform Admin. Write operations are restricted to Shopkeeper.
            </div>
        </div>

        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Sales History', 'View and manage all sales transactions', 'bi bi-receipt text-primary', '/sales/new', 'New Sale', null)}">
        </div>

        <!-- Search & Filter Bar -->
        <form method="get" action="/sales" class="card modern-card mb-3">
            <div class="card-body py-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold mb-1">Customer Search</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="search" class="form-control" placeholder="Customer name..."
                                th:value="${currentSearch}">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold mb-1">From Date</label>
                        <input type="date" name="startDate" class="form-control form-control-sm"
                            th:value="${currentStartDate}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold mb-1">To Date</label>
                        <input type="date" name="endDate" class="form-control form-control-sm"
                            th:value="${currentEndDate}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold mb-1">Payment</label>
                        <select name="paymentMethod" class="form-select form-select-sm">
                            <option value="">All Methods</option>
                            <option value="CASH" th:selected="${currentPaymentMethod == 'CASH'}">Cash</option>
                            <option value="CARD" th:selected="${currentPaymentMethod == 'CARD'}">Card</option>
                            <option value="UPI" th:selected="${currentPaymentMethod == 'UPI'}">UPI</option>
                            <option value="CREDIT" th:selected="${currentPaymentMethod == 'CREDIT'}">Credit</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-sm flex-fill">
                            <i class="bi bi-funnel"></i> Filter
                        </button>
                        <a href="/sales" class="btn btn-outline-secondary btn-sm flex-fill"
                            th:classappend="${currentSearch != null or currentStartDate != null or currentEndDate != null or currentPaymentMethod != null} ? '' : 'd-none'">
                            <i class="bi bi-x-circle"></i> Clear
                        </a>
                    </div>
                </div>
            </div>
        </form>

        <!-- Sales Table -->
        <div class="card modern-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> All Transactions
                </h5>
                <span class="badge bg-primary ent-row-count" th:text="${salePage.totalElements} + ' Sales'">0 Sales</span>
            </div>
            <div class="card-body">
                <th:block th:if="${salePage.isEmpty()}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-cart-check text-success opacity-75', 'No sales yet?', 'Make your first sale and watch your business grow!', '/sales/new', 'Make First Sale')}">
                    </div>
                </th:block>

                <!-- Table -->
                <div th:unless="${salePage.isEmpty()}" class="table-responsive">
                    <table class="modern-table table table-animate-rows table-sticky-right">
                        <thead>
                            <tr>
                                <th><i class="bi bi-calendar-event"></i> Date & Time</th>
                                <th><i class="bi bi-capsule"></i> Items</th>
                                <th class="d-none d-md-table-cell"><i class="bi bi-person"></i> Customer</th>
                                <th class="d-none d-lg-table-cell"><i class="bi bi-box"></i> Total Qty</th>
                                <th><i class="bi bi-currency-rupee"></i> Final Amount</th>
                                <th class="d-none d-sm-table-cell"><i class="bi bi-credit-card"></i> Payment</th>
                                <th class="text-end"><i class="bi bi-tools"></i> Actions</th>
                            </tr>
                        </thead>
                        <!-- ░░ SKELETON ROWS ░░ -->
                        <tbody id="saleSkeletonBody" aria-hidden="true">
                            <tr class="ent-skeleton--row">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:80px;margin-bottom:6px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:55px;height:10px;"></span></td>
                                <td><div class="d-flex align-items-center gap-2"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:8px;display:inline-block;"></span><div><span class="ent-skeleton ent-skeleton--text" style="width:110px;margin-bottom:5px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:60px;height:10px;"></span></div></div></td>
                                <td class="d-none d-md-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:100px;"></span></td>
                                <td class="d-none d-lg-table-cell"><span class="ent-skeleton" style="width:64px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:72px;"></span></td>
                                <td class="d-none d-sm-table-cell"><span class="ent-skeleton" style="width:58px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td class="text-end"><div class="d-flex gap-1 justify-content-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                            <tr class="ent-skeleton--row">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:90px;margin-bottom:6px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:48px;height:10px;"></span></td>
                                <td><div class="d-flex align-items-center gap-2"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:8px;display:inline-block;"></span><div><span class="ent-skeleton ent-skeleton--text" style="width:130px;margin-bottom:5px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:50px;height:10px;"></span></div></div></td>
                                <td class="d-none d-md-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:115px;"></span></td>
                                <td class="d-none d-lg-table-cell"><span class="ent-skeleton" style="width:64px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:64px;"></span></td>
                                <td class="d-none d-sm-table-cell"><span class="ent-skeleton" style="width:58px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td class="text-end"><div class="d-flex gap-1 justify-content-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                            <tr class="ent-skeleton--row">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:75px;margin-bottom:6px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:52px;height:10px;"></span></td>
                                <td><div class="d-flex align-items-center gap-2"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:8px;display:inline-block;"></span><div><span class="ent-skeleton ent-skeleton--text" style="width:95px;margin-bottom:5px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:68px;height:10px;"></span></div></div></td>
                                <td class="d-none d-md-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:88px;"></span></td>
                                <td class="d-none d-lg-table-cell"><span class="ent-skeleton" style="width:64px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:80px;"></span></td>
                                <td class="d-none d-sm-table-cell"><span class="ent-skeleton" style="width:58px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td class="text-end"><div class="d-flex gap-1 justify-content-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                            <tr class="ent-skeleton--row">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:82px;margin-bottom:6px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:44px;height:10px;"></span></td>
                                <td><div class="d-flex align-items-center gap-2"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:8px;display:inline-block;"></span><div><span class="ent-skeleton ent-skeleton--text" style="width:118px;margin-bottom:5px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:58px;height:10px;"></span></div></div></td>
                                <td class="d-none d-md-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:105px;"></span></td>
                                <td class="d-none d-lg-table-cell"><span class="ent-skeleton" style="width:64px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:68px;"></span></td>
                                <td class="d-none d-sm-table-cell"><span class="ent-skeleton" style="width:58px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td class="text-end"><div class="d-flex gap-1 justify-content-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                            <tr class="ent-skeleton--row">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:88px;margin-bottom:6px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:50px;height:10px;"></span></td>
                                <td><div class="d-flex align-items-center gap-2"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:8px;display:inline-block;"></span><div><span class="ent-skeleton ent-skeleton--text" style="width:102px;margin-bottom:5px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:72px;height:10px;"></span></div></div></td>
                                <td class="d-none d-md-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:92px;"></span></td>
                                <td class="d-none d-lg-table-cell"><span class="ent-skeleton" style="width:64px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:74px;"></span></td>
                                <td class="d-none d-sm-table-cell"><span class="ent-skeleton" style="width:58px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td class="text-end"><div class="d-flex gap-1 justify-content-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                        </tbody>
                        <!-- ░░ REAL ROWS ░░ -->
                        <tbody id="saleTableBody" style="display:none">
                            <tr th:each="sale : ${salePage.content}">
                                <td>
                                    <div style="display: flex; flex-direction: column;">
                                        <span style="font-weight: 600;"
                                            th:text="${#temporals.format(sale.saleDate, 'dd MMM yyyy')}"></span>
                                        <small class="text-muted"
                                            th:text="${#temporals.format(sale.saleDate, 'hh:mm a')}"></small>
                                    </div>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="transaction-icon">
                                            <i class="bi bi-cart"></i>
                                        </div>
                                        <div>
                                            <span th:if="${sale.items.size() > 0}"
                                                th:text="${sale.items[0].medicine.name}"></span>
                                            <span th:if="${sale.items.size() == 0}">No items</span>
                                            <small th:if="${sale.items.size() > 1}" class="text-muted d-block"
                                                th:text="'+ ' + ${sale.items.size() - 1} + ' more'"></small>
                                        </div>
                                    </div>
                                </td>
                                <td class="d-none d-md-table-cell">
                                    <span th:if="${sale.customer != null}" th:text="${sale.customer.name}"></span>
                                    <span th:unless="${sale.customer != null}" class="customer-type">
                                        <i class="bi bi-person-walking"></i> Walk-in
                                    </span>
                                </td>
                                <td class="d-none d-lg-table-cell">
                                    <span class="badge bg-secondary"
                                        th:text="${#aggregates.sum(sale.items.![quantity]) ?: 0} + ' units'"></span>
                                </td>
                                <td>
                                    <span class="sale-amount"
                                        th:text="'₹' + ${#numbers.formatDecimal(sale.finalAmount != null ? sale.finalAmount : sale.totalAmount, 0, 2)}"></span>
                                </td>
                                <td class="d-none d-sm-table-cell">
                                    <span th:class="'payment-badge payment-' + (${sale.paymentMethod != null ? sale.paymentMethod.toLowerCase() : 'unknown'})"
                                        th:text="${sale.paymentMethod != null ? sale.paymentMethod : 'N/A'}">
                                    </span>
                                </td>
                                <td class="text-end">
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/sales/invoice/{id}(id=${sale.id})}"
                                            class="btn btn-sm btn-outline-primary" target="_blank" title="View Invoice">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <form th:action="@{/sales/delete/{id}(id=${sale.id})}" method="post"
                                            style="display:inline"
                                            data-confirm-delete="Are you sure you want to delete this sale? Stock will be restored. This action cannot be undone.">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete Sale">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var sk = document.getElementById('saleSkeletonBody');
                    var rb = document.getElementById('saleTableBody');
                    if (!sk || !rb) return;
                    setTimeout(function () { sk.style.display = 'none'; rb.style.display = ''; }, 210);
                });
                </script>

                <!-- Pagination -->
                <div th:if="${salePage.totalPages > 1}"
                    class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4">
                    <div class="text-muted small mb-2 mb-md-0">
                        Showing <span class="fw-medium" th:text="${salePage.number * salePage.size + 1}"></span> to
                        <span class="fw-medium"
                            th:text="${(salePage.number + 1) * salePage.size < salePage.totalElements ? (salePage.number + 1) * salePage.size : salePage.totalElements}"></span>
                        of <span class="fw-medium" th:text="${salePage.totalElements}"></span> entries
                    </div>
                    <nav aria-label="Sales pagination">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${salePage.first} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/sales(page=${salePage.number - 1}, size=${salePage.size}, search=${currentSearch}, startDate=${currentStartDate}, endDate=${currentEndDate}, paymentMethod=${currentPaymentMethod})}"><i
                                        class="bi bi-chevron-left"></i></a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, salePage.totalPages - 1)}"
                                th:classappend="${salePage.number == i} ? 'active'"
                                th:if="${i >= salePage.number - 2 and i <= salePage.number + 2}">
                                <a class="page-link" th:href="@{/sales(page=${i}, size=${salePage.size}, search=${currentSearch}, startDate=${currentStartDate}, endDate=${currentEndDate}, paymentMethod=${currentPaymentMethod})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${salePage.last} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/sales(page=${salePage.number + 1}, size=${salePage.size}, search=${currentSearch}, startDate=${currentStartDate}, endDate=${currentEndDate}, paymentMethod=${currentPaymentMethod})}"><i
                                        class="bi bi-chevron-right"></i></a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
