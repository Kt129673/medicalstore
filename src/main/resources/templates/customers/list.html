<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Customers', page='customers', content=~{::#content}, pageIcon='bi bi-people-fill')}">

<body>
    <div id="content">

        <!-- Read-Only Monitoring Mode: shown to ADMIN drilling down into operations -->
        <div sec:authorize="hasRole('ADMIN')"
             class="alert alert-info d-flex align-items-center gap-2 mb-3" role="alert">
            <i class="bi bi-eye-fill fs-5 flex-shrink-0"></i>
            <div>
                <strong>Read-Only Monitoring Mode.</strong>
                You are viewing operational data as Platform Admin. Write operations are restricted to Shopkeeper.
            </div>
        </div>

        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Customers', 'Manage customer information and loyalty programs', 'bi bi-people-fill text-primary', '/customers/new', 'Add New Customer', null)}">
        </div>

        <!-- Search Bar -->
        <div th:replace="~{fragments :: search-bar('/customers', 'Search by name, phone, or email...')}"></div>

        <!-- Customers Table -->
        <div class="card modern-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> Customer Directory
                </h5>
                <span class="badge bg-primary ent-row-count" th:text="${customers.size()} + ' Total'">0 Total</span>
            </div>
            <div class="card-body">
                <th:block th:if="${customers.isEmpty()}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-people text-info opacity-75', 'No customers yet?', 'Add your first customer to start building relationships!', '/customers/new', 'Add First Customer')}">
                    </div>
                </th:block>

                <!-- Table -->
                <div th:unless="${customers.isEmpty()}" class="table-responsive">
                    <table class="modern-table table table-animate-rows table-sticky-right">
                        <thead>
                            <tr>
                                <th><i class="bi bi-person"></i> Customer</th>
                                <th><i class="bi bi-telephone"></i> Contact</th>
                                <th><i class="bi bi-geo-alt"></i> Address</th>
                                <th><i class="bi bi-star"></i> Loyalty Points</th>
                                <th><i class="bi bi-calendar"></i> Member Since</th>
                                <th class="text-end"><i class="bi bi-tools"></i> Actions</th>
                            </tr>
                        </thead>
                        <!-- ░░ SKELETON ROWS ░░ -->
                        <tbody id="custSkeletonBody" aria-hidden="true">
                            <tr class="ent-skeleton--row" th:each="i : ${#numbers.sequence(1,5)}">
                                <td><div class="d-flex align-items-center gap-2"><span class="ent-skeleton ent-skeleton--avatar"></span><div><span class="ent-skeleton ent-skeleton--text" style="width:110px;margin-bottom:6px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:60px;height:10px;"></span></div></div></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:100px;margin-bottom:6px;"></span><span class="ent-skeleton ent-skeleton--text" style="width:130px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:140px;"></span></td>
                                <td><span class="ent-skeleton" style="width:72px;height:22px;border-radius:12px;display:inline-block;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:90px;"></span></td>
                                <td class="text-end"><div class="d-flex gap-1 justify-content-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                        </tbody>
                        <!-- ░░ REAL ROWS ░░ -->
                        <tbody id="custTableBody" style="display:none">
                            <tr th:each="customer : ${customers}">
                                <td>
                                    <div class="customer-info">
                                        <div class="customer-avatar"
                                            th:text="${!#strings.isEmpty(customer.name) ? customer.name.substring(0,1).toUpperCase() : '?'}">C</div>
                                        <div class="customer-details">
                                            <span class="customer-name" th:text="${customer.name}">Customer Name</span>
                                            <span class="customer-id" th:text="'ID: #' + ${customer.id}">ID: #1</span>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <div class="contact-info">
                                        <span>
                                            <i class="bi bi-telephone-fill contact-icon"></i>
                                            <span th:text="${customer.phone}"></span>
                                        </span>
                                        <span th:if="${customer.email}">
                                            <i class="bi bi-envelope-fill contact-icon"></i>
                                            <span th:text="${customer.email}"></span>
                                        </span>
                                        <span th:unless="${customer.email}" class="text-muted small">
                                            <i class="bi bi-envelope"></i> No email
                                        </span>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${customer.address}"
                                        th:text="${#strings.abbreviate(customer.address, 40)}"></span>
                                    <span th:unless="${customer.address}" class="text-muted small">No address</span>
                                </td>
                                <td>
                                    <span class="badge loyalty-badge" th:text="${customer.loyaltyPoints} + ' Points'">0
                                        Points</span>
                                </td>
                                <td
                                    th:text="${customer.registeredDate != null ? #temporals.format(customer.registeredDate, 'MMM dd, yyyy') : 'N/A'}">
                                    Jan 01, 2024</td>
                                <td class="text-end">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/customers/{id}(id=${customer.id})}"
                                            class="btn btn-outline-info" title="View Details">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/customers/edit/{id}(id=${customer.id})}"
                                            class="btn btn-outline-primary" title="Edit" sec:authorize="hasRole('SHOPKEEPER')">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form method="post" th:action="@{/customers/delete/{id}(id=${customer.id})}" style="display:inline"
                                              data-confirm-delete="Are you sure you want to delete this customer? This action cannot be undone."
                                              sec:authorize="hasRole('ADMIN')">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline-danger" title="Delete">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var sk = document.getElementById('custSkeletonBody');
                    var rb = document.getElementById('custTableBody');
                    if (!sk || !rb) return;
                    setTimeout(function () { sk.style.display = 'none'; rb.style.display = ''; }, 230);
                });
                </script>
            </div>
        </div>
    </div>
</body>

</html>
