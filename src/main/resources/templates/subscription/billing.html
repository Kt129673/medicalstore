<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Expired</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .icon {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="card p-5 text-center">
        <i class="bi bi-exclamation-triangle-fill icon"></i>
        <h2 class="fw-bold text-dark mb-3">Subscription Expired</h2>
        <p class="text-muted mb-4">
            Your Medical Store management platform subscription has expired. Please renew your plan to restore access to
            all features.
        </p>
        <div class="d-grid gap-2">
            <a href="#" class="btn btn-danger btn-lg rounded-pill"
                onclick="alert('Payment Gateway Integration Pending')">Renew Subscription Now</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <button type="submit" class="btn btn-light w-100 rounded-pill text-muted">Sign Out</button>
            </form>
        </div>
    </div>
</body>

</html>
