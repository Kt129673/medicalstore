<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medical Store Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-color: #10b981;
            --danger-color: #ef4444;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 480px;
            width: 100%;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            background: var(--primary-gradient);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        
        .login-header i {
            font-size: 64px;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .login-header p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
        }
        
        .login-body {
            padding: 40px 30px;
        }
        
        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            z-index: 10;
        }
        
        .input-group .form-control {
            padding-left: 50px;
        }
        
        .btn-login {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 24px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .alert {
            border-radius: 12px;
            border: none;
            padding: 14px 18px;
            font-size: 14px;
            margin-bottom: 24px;
            animation: slideDown 0.4s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-danger {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .alert i {
            margin-right: 8px;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            font-size: 14px;
        }
        
        .form-check-label {
            color: #6b7280;
            font-weight: 500;
        }
        
        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .forgot-link:hover {
            color: #764ba2;
        }
        
        .login-footer {
            text-align: center;
            padding: 20px;
            background: #f9fafb;
            font-size: 13px;
            color: #6b7280;
        }
        
        .version-badge {
            display: inline-block;
            background: var(--primary-gradient);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .security-note {
            text-align: center;
            margin-top: 20px;
            padding: 16px;
            background: #f0f9ff;
            border-radius: 12px;
            border-left: 4px solid #0ea5e9;
        }
        
        .security-note i {
            color: #0ea5e9;
            margin-right: 8px;
        }
        
        .security-note p {
            margin: 0;
            font-size: 13px;
            color: #075985;
            font-weight: 500;
        }
        
        /* Loading state */
        .btn-login.loading {
            pointer-events: none;
            position: relative;
            color: transparent;
        }
        
        .btn-login.loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .login-container {
                max-width: 100%;
            }
            
            .login-card {
                border-radius: 20px;
            }
            
            .login-header {
                padding: 30px 20px;
            }
            
            .login-header i {
                font-size: 52px;
                margin-bottom: 12px;
            }
            
            .login-header h1 {
                font-size: 24px;
                margin-bottom: 6px;
            }
            
            .login-header p {
                font-size: 13px;
            }
            
            .login-body {
                padding: 30px 20px;
            }
            
            .form-control {
                padding: 12px 16px;
                font-size: 14px;
            }
            
            .input-group .form-control {
                padding-left: 45px;
            }
            
            .input-group-icon {
                left: 16px;
                font-size: 16px;
            }
            
            .btn-login {
                padding: 12px;
                font-size: 15px;
                margin-top: 20px;
            }
            
            .security-note {
                padding: 12px;
                margin-top: 16px;
            }
            
            .security-note p {
                font-size: 12px;
            }
            
            .login-footer {
                padding: 16px;
                font-size: 12px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .login-header {
                padding: 25px 15px;
            }
            
            .login-header i {
                font-size: 48px;
            }
            
            .login-header h1 {
                font-size: 20px;
            }
            
            .login-header p {
                font-size: 12px;
            }
            
            .login-body {
                padding: 25px 15px;
            }
            
            .form-label {
                font-size: 13px;
            }
            
            .form-control {
                padding: 11px 14px;
                font-size: 13px;
                border-radius: 10px;
            }
            
            .input-group .form-control {
                padding-left: 42px;
            }
            
            .input-group-icon {
                left: 14px;
                font-size: 15px;
            }
            
            .btn-login {
                padding: 11px;
                font-size: 14px;
                border-radius: 10px;
            }
            
            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .alert {
                padding: 12px 14px;
                font-size: 13px;
                margin-bottom: 20px;
            }
            
            .security-note {
                padding: 10px;
                margin-top: 14px;
            }
            
            .security-note p {
                font-size: 11px;
            }
            
            .login-footer {
                padding: 14px;
            }
            
            .version-badge {
                font-size: 10px;
                padding: 3px 10px;
            }
        }
        
        /* Landscape orientation on mobile */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            
            .login-header {
                padding: 20px 25px;
            }
            
            .login-header i {
                font-size: 40px;
                margin-bottom: 8px;
            }
            
            .login-header h1 {
                font-size: 22px;
            }
            
            .login-body {
                padding: 20px 25px;
            }
            
            .security-note {
                margin-top: 12px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <i class="bi bi-shield-lock-fill"></i>
                <h1>Medical Store Management</h1>
                <p>Enterprise Security Portal</p>
            </div>
            
            <!-- Body -->
            <div class="login-body">
                <!-- Error Alert -->
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${error}">Error message</span>
                </div>
                
                <!-- Success Alert -->
                <div th:if="${message}" class="alert alert-success" role="alert">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${message}">Success message</span>
                </div>
                
                <!-- Login Form -->
                <form th:action="@{/login}" method="post" id="loginForm">
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <i class="bi bi-person-fill input-group-icon"></i>
                            <input type="text" 
                                   class="form-control" 
                                   id="username" 
                                   name="username" 
                                   placeholder="Enter your username"
                                   required 
                                   autofocus
                                   autocomplete="username">
                        </div>
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <i class="bi bi-lock-fill input-group-icon"></i>
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Enter your password"
                                   required
                                   autocomplete="current-password">
                        </div>
                    </div>
                    
                    <!-- Remember Me & Forgot Password -->
                    <div class="remember-forgot">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember-me">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                    </div>
                    
                    <!-- Login Button -->
                    <button type="submit" class="btn btn-login" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                
                <!-- Security Note -->
                <div class="security-note">
                    <i class="bi bi-shield-check"></i>
                    <p>Secured with 256-bit encryption</p>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; 2025 Medical Store Management System</p>
                <span class="version-badge">v1.0.0</span>
            </div>
        </div>
    </div>
    
    <script>
        // Add loading state to button on form submit
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
        });
        
        // Auto-remove alerts after 5 seconds
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                alert.style.transition = 'opacity 0.5s ease';
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
