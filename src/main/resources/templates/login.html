<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Medical Store Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .brand-icon {
            font-size: 42px;
            color: #667eea;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 14px 10px 42px;
            border: 1.5px solid #e2e8f0;
            font-size: 14.5px;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            pointer-events: none;
            z-index: 5;
        }

        .input-wrapper { position: relative; }

        .password-toggle-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #64748b;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 6;
            cursor: pointer;
        }

        .password-toggle-btn:hover { background: #f1f5f9; }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 11px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            width: 100%;
            position: relative;
        }

        .btn-login:hover { opacity: 0.92; color: #fff; }
        .btn-login:active { opacity: 1; }

        .btn-login.loading {
            color: transparent !important;
            pointer-events: none;
        }

        .btn-spinner {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
        }

        .btn-login.loading .btn-spinner { display: flex; }

        .btn-spinner::after {
            content: '';
            width: 19px; height: 19px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            border-radius: 10px;
            border: none;
            font-size: 13.5px;
            padding: 12px 14px;
            display: flex;
            align-items: flex-start;
            gap: 9px;
        }

        .alert-danger  { background: #fef2f2; color: #991b1b; border-left: 4px solid #ef4444; }
        .alert-success { background: #ecfdf5; color: #065f46; border-left: 4px solid #10b981; }

        .caps-lock-hint {
            display: none;
            font-size: 11.5px;
            color: #b45309;
            font-weight: 600;
            margin-top: 4px;
        }
        .caps-lock-hint.show { display: flex; align-items: center; gap: 4px; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        .divider hr { flex: 1; border: none; border-top: 1.5px solid #e2e8f0; margin: 0; }
        .divider span { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.6px; }

        .quick-login-box {
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            overflow: hidden;
        }

        .quick-login-header {
            background: #f8fafc;
            border-bottom: 1.5px solid #e2e8f0;
            padding: 9px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .role-cards {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1px;
            background: #e2e8f0;
        }

        .role-card {
            background: #fff;
            border: none;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }

        .role-card:hover { background: #f8fafc; }
        .role-card:active { background: #f1f5f9; }

        .role-icon-wrap {
            width: 40px; height: 40px;
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            position: relative;
        }

        .role-card.admin   .role-icon-wrap { background: #fef2f2; color: #dc2626; }
        .role-card.owner   .role-icon-wrap { background: #eff6ff; color: #1d4ed8; }
        .role-card.shopkeeper .role-icon-wrap { background: #f0fdf4; color: #15803d; }

        .role-card-name { font-size: 12.5px; font-weight: 700; color: #0f172a; }
        .role-card-user { font-size: 10.5px; color: #94a3b8; }

        .role-spinner {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.85);
            border-radius: inherit;
            align-items: center;
            justify-content: center;
        }
        .role-spinner::after {
            content: '';
            width: 14px; height: 14px;
            border: 2px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .role-card.loading-role .role-spinner { display: flex; }
        .role-card.loading-role { pointer-events: none; opacity: 0.7; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .shake { animation: shake 0.45s ease; }
    </style>
</head>

<body>

<div class="login-card">

    <!-- Header -->
    <div class="text-center mb-4">
        <i class="bi bi-capsule-pill brand-icon"></i>
        <h4 class="fw-bold mt-2 mb-0" style="color:#0f172a;">Medical Store Management</h4>
        <p class="text-muted mt-1 mb-0" style="font-size:14px;">Sign in to your account to continue</p>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger mb-3" id="errorAlert" role="alert">
        <i class="bi bi-shield-exclamation"></i>
        <div>
            <div class="fw-semibold" th:text="${error}">Error message</div>
            <div style="font-size:12px; opacity:0.8; margin-top:2px;">Check your credentials and try again.</div>
        </div>
    </div>

    <!-- Success Alert -->
    <div th:if="${message}" class="alert alert-success mb-3" role="alert">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${message}">Success message</span>
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post" id="loginForm" novalidate>

        <!-- Username -->
        <div class="mb-3">
            <label for="username" class="form-label fw-semibold" style="font-size:13px;">Username</label>
            <div class="input-wrapper">
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Enter your username"
                       required autofocus autocomplete="username">
                <i class="bi bi-person-fill input-icon"></i>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label for="password" class="form-label fw-semibold" style="font-size:13px;">Password</label>
            <div class="input-wrapper">
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter your password"
                       required autocomplete="current-password"
                       style="padding-right:44px;">
                <i class="bi bi-lock-fill input-icon"></i>
                <button type="button" class="password-toggle-btn" id="passwordToggle"
                        aria-label="Show password" aria-pressed="false">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
            <div class="caps-lock-hint" id="capsLockHint">
                <i class="bi bi-exclamation-triangle-fill"></i> Caps Lock is on
            </div>
        </div>

        <!-- Remember Me -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember" name="remember-me">
            <label class="form-check-label text-muted" for="remember" style="font-size:13.5px;">
                Remember me
            </label>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="btn btn-login" id="loginBtn">
            <span class="btn-text">Sign In &nbsp;<i class="bi bi-arrow-right"></i></span>
            <span class="btn-spinner"></span>
        </button>

    </form>

    <!-- Quick Login as Role -->
    <div class="divider mt-4">
        <hr><span>or sign in as</span><hr>
    </div>

    <div class="quick-login-box">
        <div class="quick-login-header">
            <i class="bi bi-lightning-charge-fill"></i>
            Quick Login as Role
        </div>
        <div class="role-cards">

            <!-- Admin -->
            <button type="button" class="role-card admin" id="btn-admin"
                    onclick="quickLogin(this,'admin','admin123')"
                    title="Login as Admin">
                <div class="role-icon-wrap">
                    <i class="bi bi-shield-fill-check"></i>
                    <span class="role-spinner"></span>
                </div>
                <div>
                    <div class="role-card-name">Admin</div>
                    <div class="role-card-user">admin</div>
                </div>
            </button>

            <!-- Owner -->
            <button type="button" class="role-card owner" id="btn-owner"
                    onclick="quickLogin(this,'default_owner','Owner@123')"
                    title="Login as Owner">
                <div class="role-icon-wrap">
                    <i class="bi bi-person-badge-fill"></i>
                    <span class="role-spinner"></span>
                </div>
                <div>
                    <div class="role-card-name">Owner</div>
                    <div class="role-card-user">default_owner</div>
                </div>
            </button>

            <!-- Shopkeeper -->
            <button type="button" class="role-card shopkeeper" id="btn-shop"
                    onclick="quickLogin(this,'shop1','shop123')"
                    title="Login as Shopkeeper">
                <div class="role-icon-wrap">
                    <i class="bi bi-shop-window"></i>
                    <span class="role-spinner"></span>
                </div>
                <div>
                    <div class="role-card-name">Shopkeeper</div>
                    <div class="role-card-user">shop1</div>
                </div>
            </button>

        </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-muted mt-4 mb-0" style="font-size:12px;">
        &copy; <span id="footerYear">2026</span> Medical Store Management System &bull; v1.0.0
    </p>

</div>

<script>
(function () {
    'use strict';

    const loginForm     = document.getElementById('loginForm');
    const loginBtn      = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    const eyeIcon       = document.getElementById('eyeIcon');
    const capsLockHint  = document.getElementById('capsLockHint');

    /* Quick Login */
    window.quickLogin = function (btn, user, pass) {
        btn.classList.add('loading-role');
        usernameInput.value = user;
        passwordInput.value = pass;
        loginBtn.classList.add('loading');
        loginForm.submit();
    };

    /* Form Submit */
    if (loginForm) {
        loginForm.addEventListener('submit', function (e) {
            const u = usernameInput.value.trim();
            const p = passwordInput.value;

            if (!u || !p) {
                e.preventDefault();
                [usernameInput, passwordInput].forEach(function (inp) {
                    if (!inp.value.trim()) {
                        inp.style.borderColor = '#ef4444';
                        inp.classList.add('shake');
                        inp.addEventListener('animationend', function () {
                            inp.classList.remove('shake');
                        }, { once: true });
                    }
                });
                return;
            }

            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
        });

        [usernameInput, passwordInput].forEach(function (inp) {
            inp.addEventListener('input', function () {
                inp.style.borderColor = '';
            });
        });
    }

    /* Password Toggle */
    if (passwordToggle && passwordInput) {
        passwordToggle.addEventListener('click', function () {
            var isPwd = passwordInput.type === 'password';
            passwordInput.type = isPwd ? 'text' : 'password';
            eyeIcon.className  = isPwd ? 'bi bi-eye-slash' : 'bi bi-eye';
            passwordToggle.setAttribute('aria-label',   isPwd ? 'Hide password' : 'Show password');
            passwordToggle.setAttribute('aria-pressed', String(isPwd));
            passwordInput.focus();
        });
    }

    /* Caps Lock Detection */
    if (passwordInput && capsLockHint) {
        passwordInput.addEventListener('keydown', function (e) {
            capsLockHint.classList.toggle('show', e.getModifierState('CapsLock'));
        });
        passwordInput.addEventListener('blur', function () {
            capsLockHint.classList.remove('show');
        });
    }

    /* Auto-dismiss alerts after 8 s */
    setTimeout(function () {
        document.querySelectorAll('.alert').forEach(function (el) {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(function () { el.remove(); }, 520);
        });
    }, 8000);

    /* Shake form if error on load */
    var errorAlert = document.getElementById('errorAlert');
    if (errorAlert && loginForm) {
        loginForm.classList.add('shake');
        loginForm.addEventListener('animationend', function () {
            loginForm.classList.remove('shake');
        }, { once: true });
    }

    /* Footer year */
    var fy = document.getElementById('footerYear');
    if (fy) { fy.textContent = new Date().getFullYear(); }
})();
</script>

</body>
</html>
