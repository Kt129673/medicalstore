<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Create User', page='admin', content=~{::main})}">
<main>
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <h4 class="fw-bold mb-0"><i class="bi bi-person-plus-fill me-2 text-primary"></i>Create New User
                        </h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <form th:action="@{/admin/users/create}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" name="fullName" class="form-control" required
                                    placeholder="e.g. Ramesh Kumar">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Username</label>
                                <input type="text" name="username" class="form-control" required
                                    placeholder="e.g. ramesh_kumar">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" name="email" class="form-control"
                                    placeholder="e.g. ramesh@store.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" name="password" class="form-control" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Role</label>
                                <select name="role" id="roleSelect" class="form-select" required
                                    onchange="toggleBranch(this.value)">
                                    <option value="">-- Select Role --</option>
                                    <option value="OWNER">Owner</option>
                                    <option value="SHOPKEEPER">Shopkeeper</option>
                                </select>
                            </div>
                            <div class="mb-3" id="branchSection" style="display:none;">
                                <label class="form-label fw-semibold">Assign Branch <span
                                        class="text-danger">*</span></label>
                                <select name="branchId" id="branchId" class="form-select">
                                    <option value="">-- Select Branch --</option>
                                    <option th:each="b : ${branches}" th:value="${b.id}"
                                        th:text="${b.name + ' (' + b.owner.fullName + ')'}"></option>
                                </select>
                                <div class="form-text">Required for Shopkeeper role.</div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i>Create User
                                </button>
                                <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function toggleBranch(role) {
            const sec = document.getElementById('branchSection');
            const branchInput = document.getElementById('branchId');
            if (role === 'SHOPKEEPER') {
                sec.style.display = 'block';
                branchInput.required = true;
            } else {
                sec.style.display = 'none';
                branchInput.required = false;
            }
        }
    </script>
</main>

</html>
