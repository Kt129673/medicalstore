<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Manage Users', page='admin', content=~{::main}, pageIcon='bi bi-people-fill')}">
<main>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0"><i class="bi bi-people-fill me-2"></i>User Management</h2>
                <p class="text-muted mb-0">Create and manage all users</p>
            </div>
            <a href="/admin/users/create" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Create User
            </a>
        </div>

        <!-- Flash -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card modern-card border-0">
            <!-- Search Toolbar -->
            <div class="card-header bg-white border-bottom d-flex align-items-center gap-3 py-3">
                <div class="input-group" style="max-width:340px;">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="userSearch" class="form-control border-start-0 ps-0"
                           placeholder="Search by name, username, role..." autocomplete="off"
                           aria-label="Search users"/>
                </div>
                <select id="roleFilter" class="form-select" style="max-width:160px;" aria-label="Filter by role">
                    <option value="">All Roles</option>
                    <option value="ADMIN">Admin</option>
                    <option value="OWNER">Owner</option>
                    <option value="SHOPKEEPER">Shopkeeper</option>
                </select>
                <span class="ms-auto text-muted small" id="userRowCount"></span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="modern-table table align-middle mb-0" id="userTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Full Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Branch</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userSkeletonBody" aria-hidden="true">
                            <tr class="ent-skeleton--row" th:each="i : ${#numbers.sequence(1,5)}">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:30px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:120px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:100px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:150px;"></span></td>
                                <td><span class="ent-skeleton" style="width:80px;height:20px;border-radius:12px;display:inline-block;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:90px;"></span></td>
                                <td><span class="ent-skeleton" style="width:60px;height:20px;border-radius:12px;display:inline-block;"></span></td>
                                <td><div class="d-flex gap-1"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                        </tbody>
                        <tbody id="userTableBody" style="display:none">
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.fullName}"></td>
                                <td><code th:text="${user.username}"></code></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                    <span th:each="role : ${user.roles}">
                                        <span th:if="${role == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                                        <span th:if="${role == 'OWNER'}" class="badge bg-primary">OWNER</span>
                                        <span th:if="${role == 'SHOPKEEPER'}" class="badge bg-success">SHOPKEEPER</span>
                                    </span>
                                </td>
                                <td th:text="${user.branch != null ? user.branch.name : '—'}"></td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                                    <span th:unless="${user.enabled}" class="badge bg-danger">Inactive</span>
                                </td>
                                <td>
                                    <form method="post" th:action="@{/admin/users/toggle/{id}(id=${user.id})}" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-secondary me-1" title="Toggle">
                                            <i class="bi bi-toggle-on"></i>
                                        </button>
                                    </form>
                                    <form method="post" th:action="@{/admin/users/delete/{id}(id=${user.id})}" style="display:inline"
                                          data-confirm-delete="This user will be permanently deleted.">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="userEmptySearch" class="text-center text-muted py-4" style="display:none">
                    <i class="bi bi-search fs-3 d-block mb-2 opacity-50"></i>
                    No users match your search.
                </div>
            </div>
        </div>
    </div>
    <script>
    (function () {
        // Skeleton hide
        var sk = document.getElementById('userSkeletonBody');
        var rb = document.getElementById('userTableBody');
        if (sk && rb) { setTimeout(function () { sk.style.display = 'none'; rb.style.display = ''; }, 230); }

        var searchInput = document.getElementById('userSearch');
        var roleFilter  = document.getElementById('roleFilter');
        var tbody       = document.getElementById('userTableBody');
        var countEl     = document.getElementById('userRowCount');
        var emptyEl     = document.getElementById('userEmptySearch');

        function filterUsers() {
            var query = searchInput.value.trim().toLowerCase();
            var role  = roleFilter.value.toUpperCase();
            var rows  = tbody ? tbody.querySelectorAll('tr') : [];
            var visible = 0;
            rows.forEach(function (row) {
                var text = row.textContent.toLowerCase();
                var matchText = !query || text.includes(query);
                var matchRole = !role || text.includes(role.toLowerCase());
                var show = matchText && matchRole;
                row.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            if (countEl) countEl.textContent = visible + ' user' + (visible === 1 ? '' : 's');
            if (emptyEl) emptyEl.style.display = (visible === 0 && rows.length > 0) ? '' : 'none';
        }

        if (searchInput) searchInput.addEventListener('input', filterUsers);
        if (roleFilter)  roleFilter.addEventListener('change', filterUsers);
        document.addEventListener('DOMContentLoaded', filterUsers);
    })();
    </script>
</main>

</html>
