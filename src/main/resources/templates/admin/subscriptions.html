<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Subscription Management', page='admin', content=~{::main}, pageIcon='bi bi-credit-card-fill')}">
<main>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0"><i class="bi bi-credit-card-fill text-primary me-2"></i>Subscription Management</h2>
                <p class="text-muted mb-0">Manage owner subscription plans and expiry dates</p>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Owners Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="modern-table table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Owner</th>
                                <th class="d-none d-sm-table-cell">Username</th>
                                <th>Plan Type</th>
                                <th class="d-none d-md-table-cell">Expiry Date</th>
                                <th class="d-none d-lg-table-cell">Max Users</th>
                                <th class="d-none d-lg-table-cell">Max Branches</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="owner : ${owners}">
                                <td th:text="${owner.fullName}"></td>
                                <td class="d-none d-sm-table-cell"><code th:text="${owner.username}"></code></td>

                                <!-- Plan info (or "No Plan") -->
                                <th:block th:with="plan=${plansByOwner[owner.id]}">
                                    <td>
                                        <span th:if="${plan != null}"
                                            th:text="${plan.planType}"
                                            th:classappend="${plan.planType == 'ENTERPRISE'} ? 'badge bg-warning text-dark' : (${plan.planType == 'PRO'} ? 'badge bg-info text-dark' : 'badge bg-secondary')">
                                        </span>
                                        <span th:if="${plan == null}" class="badge bg-secondary">No Plan</span>
                                    </td>
                                    <td class="d-none d-md-table-cell" th:text="${plan != null} ? ${#temporals.format(plan.expiryDate, 'dd MMM yyyy')} : '—'"></td>
                                    <td class="d-none d-lg-table-cell" th:text="${plan != null} ? ${plan.maxUsers} : '—'"></td>
                                    <td class="d-none d-lg-table-cell" th:text="${plan != null} ? ${plan.maxBranches} : '—'"></td>
                                    <td>
                                        <span th:if="${plan == null}" class="badge bg-secondary">No Subscription</span>
                                        <span th:if="${plan != null and !plan.expired}" class="badge bg-success">Active</span>
                                        <span th:if="${plan != null and plan.expired}" class="badge bg-danger">Expired</span>
                                    </td>
                                </th:block>

                                <!-- Update Subscription Form -->
                                <td>
                                    <button class="btn btn-sm btn-outline-primary"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="${'#subModal-' + owner.id}">
                                        <i class="bi bi-pencil-square me-1"></i>Update
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(owners)}">
                                <td colspan="8" class="text-center text-muted py-4">No owners found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modals for each owner -->
        <div th:each="owner : ${owners}">
            <div class="modal fade" th:id="${'subModal-' + owner.id}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">
                                <i class="bi bi-credit-card-fill me-2 text-primary"></i>
                                Update Subscription — <span th:text="${owner.username}"></span>
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form th:action="@{/admin/subscriptions/update}" method="post">
                            <div class="modal-body">
                                <input type="hidden" name="ownerId" th:value="${owner.id}">

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Plan Type</label>
                                    <select name="planType" class="form-select" required
                                        th:with="plan=${plansByOwner[owner.id]}">
                                        <option value="FREE"
                                            th:selected="${plan == null or plan.planType == 'FREE'}">FREE</option>
                                        <option value="PRO"
                                            th:selected="${plan != null and plan.planType == 'PRO'}">PRO</option>
                                        <option value="ENTERPRISE"
                                            th:selected="${plan != null and plan.planType == 'ENTERPRISE'}">ENTERPRISE</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Expiry Date</label>
                                    <input type="date" name="expiryDate" class="form-control" required
                                        th:with="plan=${plansByOwner[owner.id]}"
                                        th:value="${plan != null} ? ${#temporals.format(plan.expiryDate, 'yyyy-MM-dd')} : ''">
                                    <div class="form-text">Set the new subscription expiry date.</div>
                                </div>

                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Max Users</label>
                                        <input type="number" name="maxUsers" class="form-control" min="1"
                                            th:with="plan=${plansByOwner[owner.id]}"
                                            th:value="${plan != null} ? ${plan.maxUsers} : 10">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Max Branches</label>
                                        <input type="number" name="maxBranches" class="form-control" min="1"
                                            th:with="plan=${plansByOwner[owner.id]}"
                                            th:value="${plan != null} ? ${plan.maxBranches} : 5">
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i>Save Subscription
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>
</html>
