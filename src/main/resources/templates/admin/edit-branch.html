<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Edit Branch', page='admin', content=~{::main}, pageIcon='bi bi-building-gear')}">
<main>
    <div class="container-fluid py-4" style="max-width:600px">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="/admin/branches" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <div>
                <h2 class="fw-bold mb-0"><i class="bi bi-building-gear text-success me-2"></i>Edit Branch</h2>
                <p class="text-muted mb-0" th:text="${editBranch.name}"></p>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="fw-bold mb-0"><i class="bi bi-pencil me-2 text-success"></i>Branch Details</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/branches/edit/{id}(id=${editBranch.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Branch Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" th:value="${editBranch.name}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Address <span class="text-danger">*</span></label>
                        <textarea name="address" class="form-control" rows="2" required
                            th:text="${editBranch.address}"></textarea>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text" name="phone" class="form-control" th:value="${editBranch.phone}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">GST Number</label>
                            <input type="text" name="gstNumber" class="form-control" th:value="${editBranch.gstNumber}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Licence Number</label>
                        <input type="text" name="licenceNumber" class="form-control" th:value="${editBranch.licenceNumber}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Owner <span class="text-danger">*</span></label>
                        <select name="ownerId" class="form-select" required>
                            <option th:each="owner : ${owners}"
                                    th:value="${owner.id}"
                                    th:text="${owner.fullName + ' (' + owner.username + ')' }"
                                    th:selected="${editBranch.owner != null and editBranch.owner.id == owner.id}">
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg me-1"></i>Save Changes
                        </button>
                        <a href="/admin/branches" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</html>
