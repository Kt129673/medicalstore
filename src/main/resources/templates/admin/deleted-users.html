<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Deleted Users', page='admin', content=~{::main}, pageIcon='bi bi-trash')}">
<main>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0"><i class="bi bi-trash me-2"></i>Deleted Users</h2>
                <p class="text-muted mb-0">Soft-deleted users — restore to re-activate their account</p>
            </div>
            <a href="/admin/users" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to Users
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card modern-card border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="modern-table table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Username</th>
                                <th class="d-none d-sm-table-cell">Full Name</th>
                                <th class="d-none d-md-table-cell">Email</th>
                                <th>Roles</th>
                                <th class="d-none d-sm-table-cell">Deleted At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${deletedUsers.isEmpty()}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    <i class="bi bi-check-circle-fill fs-3 d-block mb-2 text-success"></i>
                                    No deleted users found.
                                </td>
                            </tr>
                            <tr th:each="user : ${deletedUsers}">
                                <td th:text="${user.username}"></td>
                                <td class="d-none d-sm-table-cell" th:text="${user.fullName}"></td>
                                <td class="d-none d-md-table-cell" th:text="${user.email}"></td>
                                <td>
                                    <span th:each="role : ${user.roles}"
                                          class="badge me-1"
                                          th:classappend="${role == 'ADMIN'} ? 'bg-warning text-dark' : (${role == 'OWNER'} ? 'bg-info text-dark' : 'bg-success')"
                                          th:text="${role}"></span>
                                </td>
                                <td class="d-none d-sm-table-cell">
                                    <small class="text-muted"
                                           th:text="${user.deletedAt != null} ? ${#temporals.format(user.deletedAt, 'dd MMM yyyy HH:mm')} : 'Unknown'">
                                    </small>
                                </td>
                                <td>
                                    <form th:action="@{/admin/users/restore/{id}(id=${user.id})}" method="post"
                                          style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-success"
                                                title="Restore this user">
                                            <i class="bi bi-arrow-counterclockwise me-1"></i>Restore
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</html>
