<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(title='Medicines', page='medicines', content=~{::#content})}">
<body>
<div id="content">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1"><i class="bi bi-capsule-pill"></i> Medicines Inventory</h2>
            <p class="text-muted mb-0">Manage your medical inventory and stock levels</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/medicines/expiry-alerts" class="btn btn-outline-danger">
                <i class="bi bi-calendar-x"></i> Expiry Alerts
            </a>
            <a href="/medicines/low-stock" class="btn btn-outline-warning">
                <i class="bi bi-exclamation-triangle"></i> Low Stock
            </a>
            <a href="/medicines/new" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add Medicine
            </a>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="card modern-card mb-4">
        <div class="card-body">
            <form method="get" action="/medicines">
                <div class="row g-3">
                    <div class="col-md-10">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" name="search" class="form-control border-start-0" 
                                   placeholder="Search by medicine name, category, or scan barcode..." 
                                   th:value="${param.search}" autofocus>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" type="submit">
                            <i class="bi bi-search"></i> Search
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Medicines Table -->
    <div class="card modern-card">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-table"></i> Medicine List</h5>
                <span class="badge bg-primary" th:text="${medicines.size()} + ' Items'">0 Items</span>
            </div>
        </div>
        <div class="card-body p-0">
            <div th:if="${medicines.isEmpty()}" class="empty-state">
                <i class="bi bi-inbox"></i>
                <h5>No Medicines Found</h5>
                <p>Start by adding your first medicine to the inventory</p>
                <a href="/medicines/new" class="btn btn-primary mt-2">
                    <i class="bi bi-plus-circle"></i> Add First Medicine
                </a>
            </div>
            <div th:unless="${medicines.isEmpty()}" class="table-responsive">
                <table class="table modern-table mb-0">
                    <thead>
                        <tr>
                            <th><i class="bi bi-capsule"></i> Medicine Name</th>
                            <th><i class="bi bi-tag"></i> Category</th>
                            <th><i class="bi bi-building"></i> Manufacturer</th>
                            <th class="text-end"><i class="bi bi-currency-rupee"></i> Price</th>
                            <th class="text-center"><i class="bi bi-box"></i> Stock</th>
                            <th><i class="bi bi-calendar3"></i> Expiry Date</th>
                            <th class="text-center"><i class="bi bi-gear"></i> Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="medicine : ${medicines}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="medicine-icon me-2">
                                        <i class="bi bi-capsule-pill"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold" th:text="${medicine.name}"></div>
                                        <small class="text-muted" th:if="${medicine.barcode}" th:text="'Barcode: ' + ${medicine.barcode}"></small>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" 
                                      th:text="${medicine.category}"></span>
                            </td>
                            <td>
                                <span class="text-muted" th:text="${medicine.manufacturer}"></span>
                            </td>
                            <td class="text-end">
                                <strong th:text="'₹' + ${#numbers.formatDecimal(medicine.price, 0, 2)}"></strong>
                            </td>
                            <td class="text-center">
                                <span th:class="${medicine.quantity < 10 ? 'badge bg-danger' : (medicine.quantity < 50 ? 'badge bg-warning text-dark' : 'badge bg-success')}" 
                                      th:text="${medicine.quantity} + ' units'"></span>
                            </td>
                            <td>
                                <span th:if="${medicine.expiryDate != null}">
                                    <i class="bi bi-calendar-event me-1"></i>
                                    <span th:text="${#temporals.format(medicine.expiryDate, 'dd MMM yyyy')}"></span>
                                </span>
                                <span th:if="${medicine.expiryDate == null}" class="text-muted">N/A</span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm" role="group">
                                    <a th:href="@{/medicines/edit/{id}(id=${medicine.id})}" 
                                       class="btn btn-outline-primary" 
                                       title="Edit">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <a th:href="@{/medicines/delete/{id}(id=${medicine.id})}" 
                                       class="btn btn-outline-danger" 
                                       onclick="return confirm('Are you sure you want to delete this medicine?')"
                                       title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .medicine-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
    }
    
    .input-group-text {
        border-radius: 10px 0 0 10px;
    }
    
    .input-group .form-control {
        border-radius: 0 10px 10px 0;
    }
</style>
</body>
</html>
</div>
</body>
</html>
