<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Medicine Form', page='medicines', content=~{::#content})}">

<body>
    <div id="content">
        <h2 class="mb-4" th:text="${medicine.id != null ? 'Edit Medicine' : 'Add New Medicine'}">Add Medicine</h2>


        <div class="card">
            <div class="card-body">
                <form th:action="@{/medicines/save}" th:object="${medicine}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{createdDate}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Medicine Name *</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category *</label>
                            <select class="form-control" th:field="*{category}" required>
                                <option value="">Select Category</option>
                                <option value="Tablet">Tablet</option>
                                <option value="Syrup">Syrup</option>
                                <option value="Injection">Injection</option>
                                <option value="Capsule">Capsule</option>
                                <option value="Ointment">Ointment</option>
                                <option value="Drops">Drops</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Manufacturer</label>
                            <input type="text" class="form-control" th:field="*{manufacturer}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Batch Number</label>
                            <input type="text" class="form-control" th:field="*{batchNumber}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Barcode</label>
                            <input type="text" class="form-control" th:field="*{barcode}"
                                placeholder="Scan or enter barcode">
                            <small class="text-muted">Leave blank to auto-generate or scan using barcode scanner</small>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Price (₹) *</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{price}"
                                required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Quantity *</label>
                            <input type="number" min="0" class="form-control" th:field="*{quantity}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" class="form-control" th:field="*{expiryDate}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save
                        </button>
                        <a href="/medicines" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
