<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Medicine Form', page='medicines', content=~{::#content}, pageIcon='bi bi-capsule-pill')}">

<body>
    <div id="content">
        <!-- Page Header -->
        <div class="page-header mb-4">
            <div>
                <h2>
                    <i class="bi bi-capsule-pill text-primary"></i>
                    <span th:text="${medicine.id != null ? 'Edit Medicine' : 'Add New Medicine'}">Add Medicine</span>
                </h2>
                <p class="text-muted mb-0">Enter medicine details including pricing, regulatory, and stock information
                </p>
            </div>
            <a href="/medicines" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
        </div>

        <form th:action="@{/medicines/save}" th:object="${medicine}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{createdDate}">

            <div class="row">
                <!-- Left Column -->
                <div class="col-lg-8">
                    <!-- Basic Information -->
                    <div class="card mb-4 shadow-sm border-0">
                        <div class="card-header bg-transparent border-bottom-0 pb-0 pt-3">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-info-circle text-primary me-2"></i>Basic
                                Information</h6>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label ent-required">Medicine Name</label>
                                    <input type="text" class="form-control" th:field="*{name}" required
                                        placeholder="e.g. Paracetamol 500mg">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label ent-required">Category</label>
                                    <input type="text" list="categoryOptions" class="form-control"
                                        th:field="*{category}" required placeholder="Select or type category">
                                    <datalist id="categoryOptions">
                                        <option th:each="cat : ${categories}" th:value="${cat}"></option>
                                    </datalist>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Manufacturer</label>
                                    <input type="text" class="form-control" th:field="*{manufacturer}"
                                        placeholder="e.g. Cipla Ltd.">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Supplier</label>
                                    <select class="form-control" th:field="*{supplier}">
                                        <option value="">Select Supplier</option>
                                        <option th:each="sup : ${suppliers}" th:value="${sup.id}" th:text="${sup.name}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Salt Composition</label>
                                    <input type="text" class="form-control" th:field="*{saltComposition}"
                                        placeholder="e.g. Paracetamol IP 500mg">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Barcode</label>
                                    <input type="text" class="form-control" th:field="*{barcode}"
                                        placeholder="Scan or enter barcode">
                                    <small class="text-muted" style="font-size: 0.75rem;">Leave blank to
                                        auto-generate</small>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Schedule Type</label>
                                    <select class="form-control" th:field="*{scheduleType}">
                                        <option value="">Select Schedule</option>
                                        <option value="OTC">OTC (Over The Counter)</option>
                                        <option value="H">Schedule H</option>
                                        <option value="H1">Schedule H1</option>
                                        <option value="X">Schedule X</option>
                                        <option value="G">Schedule G</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="card mb-4 shadow-sm border-0">
                        <div class="card-header bg-transparent border-bottom-0 pb-0 pt-3">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-card-text text-secondary me-2"></i>Additional
                                Details</h6>
                        </div>
                        <div class="card-body">
                            <div class="mb-0">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="3" th:field="*{description}"
                                    placeholder="Usage instructions, storage conditions, etc."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="col-lg-4">
                    <!-- Inventory -->
                    <div class="card mb-4 shadow-sm border-0">
                        <div class="card-header bg-transparent border-bottom-0 pb-0 pt-3">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-box-seam text-info me-2"></i>Inventory Details</h6>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label ent-required">Quantity</label>
                                <input type="number" min="0" class="form-control form-control-lg" th:field="*{quantity}"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Batch Number</label>
                                <input type="text" class="form-control" th:field="*{batchNumber}"
                                    placeholder="e.g. B2024-001">
                            </div>
                            <div class="mb-0">
                                <label class="form-label">Expiry Date</label>
                                <input type="date" class="form-control" th:field="*{expiryDate}">
                            </div>
                        </div>
                    </div>

                    <!-- Pricing -->
                    <div class="card mb-4 shadow-sm border-0">
                        <div class="card-header bg-transparent border-bottom-0 pb-0 pt-3">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-currency-rupee text-success me-2"></i>Pricing Setup
                            </h6>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Purchase Price (₹)</label>
                                <input type="number" step="0.01" min="0"
                                    class="form-control form-control-lg text-success fw-bold"
                                    th:field="*{purchasePrice}" placeholder="Cost price">
                            </div>
                            <div class="mb-3">
                                <label class="form-label ent-required">Selling Price (₹)</label>
                                <input type="number" step="0.01" min="0.01"
                                    class="form-control form-control-lg text-primary fw-bold" th:field="*{price}"
                                    required placeholder="Selling price">
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">MRP (₹)</label>
                                    <input type="number" step="0.01" min="0" class="form-control" th:field="*{mrp}"
                                        placeholder="Max Retail">
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">GST %</label>
                                    <select class="form-control" th:field="*{gstPercentage}">
                                        <option value="">Slab</option>
                                        <option value="0">0%</option>
                                        <option value="5">5%</option>
                                        <option value="12">12%</option>
                                        <option value="18">18%</option>
                                        <option value="28">28%</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">HSN Code</label>
                                <input type="text" class="form-control" th:field="*{hsnCode}"
                                    placeholder="e.g. 30049099">
                            </div>

                            <!-- Margin Preview -->
                            <div class="alert alert-light border mt-2 mb-0 rounded-3" id="marginPreview"
                                style="display:none;">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="bg-success bg-opacity-10 text-success rounded-circle p-2 d-flex align-items-center justify-content-center"
                                        style="width: 40px; height: 40px;">
                                        <i class="bi bi-graph-up-arrow"></i>
                                    </div>
                                    <div>
                                        <div class="text-muted" style="font-size: 0.75rem; text-transform: uppercase;">
                                            Est. Margin</div>
                                        <div>
                                            <span id="marginValue" class="text-success fw-bold fs-5">—</span>
                                            <span class="text-muted ms-1">(<span id="marginPercent">—</span>%)</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-grid gap-2">
                        <button type="submit" id="saveMedicineBtn" class="btn btn-primary py-3 fw-bold shadow-sm">
                            <i class="bi bi-save me-1"></i> Save Medicine
                        </button>
                        <a href="/medicines" class="btn btn-light border py-2 text-muted fw-bold shadow-sm">
                            Cancel
                        </a>
                    </div>
                </div>
            </div>
        </form>

        <!-- Margin Calculator Script -->
        <script>
            // Loading state on submit
            document.querySelector('form[th\\:action]') && document.querySelector('form').addEventListener('submit', function () {
                const btn = document.getElementById('saveMedicineBtn');
                if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving...'; }
            });

            (function () {
                const pp = document.getElementById('purchasePrice');
                const sp = document.getElementById('price');
                const preview = document.getElementById('marginPreview');
                const mVal = document.getElementById('marginValue');
                const mPct = document.getElementById('marginPercent');

                function calc() {
                    const cost = parseFloat(pp?.value);
                    const sell = parseFloat(sp?.value);
                    if (!isNaN(cost) && !isNaN(sell) && cost > 0) {
                        const margin = sell - cost;
                        const pct = ((margin / cost) * 100).toFixed(1);
                        mVal.textContent = '₹' + margin.toFixed(2);
                        mPct.textContent = pct;
                        mVal.className = margin >= 0 ? 'text-success fw-bold' : 'text-danger fw-bold';
                        preview.style.display = 'block';
                    } else {
                        preview.style.display = 'none';
                    }
                }

                if (pp && sp) {
                    pp.addEventListener('input', calc);
                    sp.addEventListener('input', calc);
                    calc();
                }
            })();
        </script>
    </div>
</body>

</html>
