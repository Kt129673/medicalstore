<!-- Role-Based UI Guard Template -->
<!-- Use this fragment in templates to ensure role-appropriate visibility -->

<div th:fragment="role-admin-only(fallbackUrl)">
    <!-- Show content only to ADMIN role; redirect others -->
    <div sec:authorize="hasRole('ADMIN')">
        <!-- Content for ADMIN goes here -->
    </div>
    <div sec:authorize="!hasRole('ADMIN')">
        <!-- Optional: show message to unauthorized users -->
        <div class="alert alert-warning">
            <i class="bi bi-exclamation-triangle"></i>
            This feature is only available to administrators.
        </div>
        <script>
            // Optional: Auto-redirect after 2 seconds
            // setTimeout(() => { window.location.href = '${fallbackUrl}'; }, 2000);
        </script>
    </div>
</div>

<!-- Fragment: OWNER-only content -->
<div th:fragment="role-owner-only(fallbackUrl)">
    <div sec:authorize="hasRole('OWNER')">
        <!-- Content for OWNER -->
    </div>
    <div sec:authorize="!hasRole('OWNER')">
        <div class="alert alert-warning">
            <i class="bi bi-exclamation-triangle"></i>
            This feature is only available to branch owners.
        </div>
    </div>
</div>

<!-- Fragment: Sensitive action confirmation with role-based messaging -->
<div th:fragment="confirm-delete-dialog(itemId, itemName, message)">
    <script>
        function confirmDelete(itemId, itemName, message) {
            Swal.fire({
                title: 'Delete ' + itemName,
                text: message,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, Delete'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Submit the hidden form
                    document.getElementById('deleteForm_' + itemId).submit();
                }
            });
            return false;
        }
    </script>
</div>

<!-- Fragment: Role badge display -->
<div th:fragment="role-badge(role)">
    <span th:switch="${role}">
        <span th:case="'ADMIN'" class="badge bg-danger">
            <i class="bi bi-shield-lock me-1"></i>Admin
        </span>
        <span th:case="'OWNER'" class="badge bg-primary">
            <i class="bi bi-person-badge me-1"></i>Owner
        </span>
        <span th:case="'SHOPKEEPER'" class="badge bg-success">
            <i class="bi bi-person-gear me-1"></i>Shopkeeper
        </span>
    </span>
</div>

<!-- Fragment: Feature availability indicator -->
<div th:fragment="feature-badge(featureName, isAvailable)">
    <span th:if="${isAvailable}" class="badge bg-success">
        <i class="bi bi-check-circle me-1"></i>Available
    </span>
    <span th:unless="${isAvailable}" class="badge bg-secondary">
        <i class="bi bi-lock me-1"></i>Not Available
    </span>
</div>

<!-- Fragment: Role-based action buttons row -->
<div th:fragment="admin-actions(itemId, editUrl, deleteAction)">
    <!-- Edit button for ADMIN only -->
    <a sec:authorize="hasRole('ADMIN')" 
       th:href="${editUrl}"
       class="btn btn-sm btn-outline-primary">
        <i class="bi bi-pencil-square me-1"></i>Edit
    </a>
    
    <!-- Delete button for ADMIN only -->
    <form sec:authorize="hasRole('ADMIN')"
          th:id="'deleteForm_' + ${itemId}"
          th:action="${deleteAction}"
          method="post"
          style="display:inline;">
        <button type="button"
                th:onclick="|return confirmDelete(${itemId}, 'Item', 'Are you sure you want to delete this item?');|"
                class="btn btn-sm btn-outline-danger">
            <i class="bi bi-trash me-1"></i>Delete
        </button>
    </form>
</div>

<!-- Fragment: Data ownership check (show edit only if owner) -->
<div th:fragment="owner-actions(isOwner, itemId, editUrl)">
    <a th:if="${isOwner}"
       th:href="${editUrl}"
       class="btn btn-sm btn-outline-primary">
        <i class="bi bi-pencil-square me-1"></i>Edit
    </a>
    <button th:unless="${isOwner}"
            class="btn btn-sm btn-outline-secondary" disabled>
        <i class="bi bi-lock me-1"></i>Not Your Item
    </button>
</div>

<!-- Fragment: Empty state with role-appropriate message -->
<div th:fragment="empty-state-with-role(icon, title, message, actionUrl, actionText)">
    <div class="empty-state text-center py-5">
        <i th:class="${icon}" class="empty-state__icon" style="font-size: 3rem; opacity: 0.3;"></i>
        <h5 class="fw-bold mt-3 mb-2" th:text="${title}">No Data</h5>
        <p class="text-muted mb-3" th:text="${message}">Empty message</p>
        
        <sec:authorize access="! isAuthenticated()">
            <a href="/login" class="btn btn-primary">
                <i class="bi bi-box-arrow-in-right me-1"></i>Login to Get Started
            </a>
        </sec:authorize>
        
        <sec:authorize access="hasRole('ADMIN')">
            <a th:if="${actionUrl}" th:href="${actionUrl}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>
                <span th:text="${actionText}">Add</span>
            </a>
        </sec:authorize>
        
        <sec:authorize access="hasRole('OWNER')">
            <a th:if="${actionUrl}" th:href="${actionUrl}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>
                <span th:text="${actionText}">Add</span>
            </a>
        </sec:authorize>
        
        <sec:authorize access="hasRole('SHOPKEEPER')">
            <a th:if="${actionUrl}" th:href="${actionUrl}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>
                <span th:text="${actionText}">Add</span>
            </a>
        </sec:authorize>
    </div>
</div>

<!-- Fragment: Bulk action toolbar with role protection -->
<div th:fragment="bulk-actions(selectedCount)">
    <div sec:authorize="hasRole('ADMIN')" class="bulk-actions-bar">
        <span class="bulk-selected-count">
            <span th:text="${selectedCount}">0</span> items selected
        </span>
        <div class="bulk-actions">
            <button type="button" class="btn btn-sm btn-danger" onclick="bulkDelete()">
                <i class="bi bi-trash me-1"></i>Delete Selected
            </button>
            <button type="button" class="btn btn-sm btn-warning" onclick="bulkExport()">
                <i class="bi bi-download me-1"></i>Export
            </button>
        </div>
    </div>
    
    <div sec:authorize="!hasRole('ADMIN')" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        Bulk operations are available only to administrators.
    </div>
</div>
