<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='My Shopkeepers', page='owner', content=~{::main}, pageIcon='bi bi-person-gear')}">
<main>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0"><i class="bi bi-people-fill me-2"></i>My Shopkeepers</h2>
                <p class="text-muted mb-0">Manage shopkeepers across your branches</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addShopkeeperModal">
                <i class="bi bi-person-plus me-1"></i>Add Shopkeeper
            </button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Assigned Branch</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sk : ${shopkeepers}">
                            <td th:text="${sk.fullName}"></td>
                            <td><code th:text="${sk.username}"></code></td>
                            <td th:text="${sk.email}"></td>
                            <td>
                                <span class="badge bg-primary" th:text="${sk.branch?.name ?: 'Unassigned'}"></span>
                            </td>
                            <td>
                                <span th:if="${sk.enabled}" class="badge bg-success">Active</span>
                                <span th:unless="${sk.enabled}" class="badge bg-danger">Inactive</span>
                            </td>
                            <td>
                                <form method="post" th:action="@{/owner/shopkeepers/toggle/{id}(id=${sk.id})}" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-secondary" title="Toggle">
                                        <i class="bi bi-toggle-on"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(shopkeepers)}">
                            <td colspan="6" class="text-center text-muted py-4">No shopkeepers yet. Add one.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Shopkeeper Modal -->
    <div class="modal fade" id="addShopkeeperModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/owner/shopkeepers/create}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Add Shopkeeper</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" name="fullName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Assign to Branch <span
                                    class="text-danger">*</span></label>
                            <select name="branchId" class="form-select" required>
                                <option value="">-- Select your branch --</option>
                                <option th:each="b : ${branches}" th:value="${b.id}" th:text="${b.name}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Create
                            Shopkeeper</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</html>
