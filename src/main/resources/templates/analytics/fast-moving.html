<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Fast Moving Items', page='analytics', content=~{::#content}, pageIcon='bi bi-lightning-charge-fill')}">

<body>
    <div id="content">
        <div class="page-header mb-4">
            <div>
                <h2><i class="bi bi-lightning-charge-fill text-success"></i> Fast-Moving Items</h2>
                <p class="text-muted mb-0">Top selling medicines by volume</p>
            </div>
            <div class="d-flex gap-2">
                <a th:if="${availableFeatures.contains('EXCEL_EXPORT')}"
                   th:href="@{/analytics/export/excel(report='fast-moving',startDate=${startDate},endDate=${endDate},limit=${limit})}"
                    class="btn btn-outline-success">
                    <i class="bi bi-file-earmark-excel"></i> Export Excel
                </a>
                <span th:unless="${availableFeatures.contains('EXCEL_EXPORT')}" class="btn btn-outline-secondary disabled" title="Upgrade to PRO to export">
                    <i class="bi bi-lock"></i> Export Excel
                </span>
                <a href="/analytics" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            </div>
        </div>

        <!-- Filter Form -->
        <div class="card mb-4 modern-card">
            <div class="card-body">
                <form action="/analytics/fast-moving" method="get" class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="startDate" class="form-control" th:value="${startDate}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">End Date</label>
                        <input type="date" name="endDate" class="form-control" th:value="${endDate}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Top N Items</label>
                        <select name="limit" class="form-select">
                            <option value="10" th:selected="${limit == 10}">Top 10</option>
                            <option value="20" th:selected="${limit == 20}">Top 20</option>
                            <option value="50" th:selected="${limit == 50}">Top 50</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100"><i class="bi bi-funnel"></i> Apply
                            Filter</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="row g-4">
            <!-- Chart -->
            <div class="col-12" th:if="${not #lists.isEmpty(data)}">
                <div class="card modern-card">
                    <div class="card-header bg-white">
                        <i class="bi bi-bar-chart-fill me-2 text-success"></i> <strong>Sales Volume (Units)</strong>
                    </div>
                    <div class="card-body">
                        <canvas id="qtyChart" height="100"></canvas>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="col-12">
                <div class="card modern-card border-success border-opacity-25">
                    <div class="table-responsive">
                        <table class="table modern-table table-hover">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Medicine</th>
                                    <th>Category</th>
                                    <th class="text-end">Units Sold</th>
                                    <th class="text-end">Total Revenue</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item, stat : ${data}">
                                    <td>
                                        <span class="badge bg-success" th:if="${stat.count <= 3}"
                                            th:text="'#' + ${stat.count}"></span>
                                        <span class="text-muted fw-bold" th:if="${stat.count > 3}"
                                            th:text="'#' + ${stat.count}"></span>
                                    </td>
                                    <td class="fw-bold" th:text="${item.name}"></td>
                                    <td><span class="badge bg-secondary bg-opacity-10 text-secondary"
                                            th:text="${item.category}"></span></td>
                                    <td class="text-end fw-bold fs-5 text-success" th:text="${item.qtySold}"></td>
                                    <td class="text-end fw-medium"
                                        th:text="'₹' + ${#numbers.formatDecimal(item.revenue, 1, 'COMMA', 2, 'POINT')}">
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(data)}">
                                    <td colspan="5" class="text-center py-4 text-muted">No sales data found for the
                                        selected period.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            const chartData = /*[[${chartJson}]]*/ '{}';
            if (chartData && chartData !== '{}') {
                const parsed = JSON.parse(chartData);
                const ctx = document.getElementById('qtyChart');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: parsed.labels,
                            datasets: [{
                                label: 'Units Sold',
                                data: parsed.qty,
                                backgroundColor: 'rgba(16, 185, 129, 0.8)',
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                }
            }
        </script>
    </div>
</body>

</html>
