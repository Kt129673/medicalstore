<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Monthly GST Summary', page='analytics', content=~{::#content}, pageIcon='bi bi-bank')}">

<body>
    <div id="content">
        <div class="page-header mb-4">
            <div>
                <h2><i class="bi bi-bank text-primary"></i> GST Summary</h2>
                <p class="text-muted mb-0">Monthly tax liability breakdown for filing</p>
            </div>
            <div class="d-flex gap-2">
                <a th:if="${availableFeatures.contains('EXCEL_EXPORT')}"
                   th:href="@{/analytics/export/excel(report='gst',year=${year})}" class="btn btn-outline-success">
                    <i class="bi bi-file-earmark-excel"></i> Export Excel
                </a>
                <span th:unless="${availableFeatures.contains('EXCEL_EXPORT')}" class="btn btn-outline-secondary disabled" title="Upgrade to PRO to export">
                    <i class="bi bi-lock"></i> Export Excel
                </span>
                <a href="/analytics" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            </div>
        </div>

        <!-- Filter Form -->
        <div class="card mb-4 modern-card">
            <div class="card-body">
                <form action="/analytics/gst-summary" method="get" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">Select Year</label>
                        <select name="year" class="form-select">
                            <option th:value="${year - 1}" th:text="${year - 1}"></option>
                            <option th:value="${year}" th:text="${year}" selected></option>
                            <option th:value="${year + 1}" th:text="${year + 1}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary w-100"><i
                                class="bi bi-calendar-date"></i> View Summary</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Summary Widget -->
        <div class="row g-4 mb-4" th:if="${not #lists.isEmpty(data)}">
            <div class="col-md-6">
                <div class="card stat-card h-100" style="background: linear-gradient(135deg, #1e3a8a, #2563eb);">
                    <div class="stat-label">Total Taxable Value (<span th:text="${year}"></span>)</div>
                    <div class="stat-value"
                        th:text="'₹' + ${#numbers.formatDecimal(annualTaxable, 1, 'COMMA', 2, 'POINT')}"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card stat-card h-100" style="background: linear-gradient(135deg, #10b981, #34d399);">
                    <div class="stat-label">Total GST Collected</div>
                    <div class="stat-value"
                        th:text="'₹' + ${#numbers.formatDecimal(annualGst, 1, 'COMMA', 2, 'POINT')}"></div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Chart -->
            <div class="col-12" th:if="${not #lists.isEmpty(data)}">
                <div class="card modern-card">
                    <div class="card-header bg-white">
                        <i class="bi bi-bar-chart-fill me-2 text-primary"></i> <strong>Monthly GST
                            Trends</strong>
                    </div>
                    <div class="card-body">
                        <canvas id="gstChart" height="100"></canvas>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="col-12">
                <div class="card modern-card border-purple border-opacity-25">
                    <div class="table-responsive">
                        <table class="table modern-table table-hover">
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th class="text-end">Transactions</th>
                                    <th class="text-end">Taxable Amount</th>
                                    <th class="text-end">CGST</th>
                                    <th class="text-end">SGST</th>
                                    <th class="text-end text-primary">Total GST</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${data}">
                                    <td class="fw-bold"><i class="bi bi-calendar-event me-2 text-muted"></i><span
                                            th:text="${item.month}"></span></td>
                                    <td class="text-end"><span class="badge bg-secondary"
                                            th:text="${item.transactionCount}"></span></td>
                                    <td class="text-end"
                                        th:text="'₹' + ${#numbers.formatDecimal(item.taxableAmount, 1, 'COMMA', 2, 'POINT')}">
                                    </td>
                                    <td class="text-end"
                                        th:text="'₹' + ${#numbers.formatDecimal(item.cgst, 1, 'COMMA', 2, 'POINT')}">
                                    </td>
                                    <td class="text-end"
                                        th:text="'₹' + ${#numbers.formatDecimal(item.sgst, 1, 'COMMA', 2, 'POINT')}">
                                    </td>
                                    <td class="text-end fw-bold text-primary"
                                        th:text="'₹' + ${#numbers.formatDecimal(item.totalGst, 1, 'COMMA', 2, 'POINT')}">
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(data)}">
                                    <td colspan="6" class="text-center py-4 text-muted">No GST data found for the
                                        selected year.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            const chartData = /*[[${chartJson}]]*/ '{}';
            if (chartData && chartData !== '{}') {
                const parsed = JSON.parse(chartData);
                const ctx = document.getElementById('gstChart');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: parsed.labels,
                            datasets: [{
                                label: 'CGST (₹)',
                                data: parsed.cgst,
                                backgroundColor: 'rgba(139, 92, 246, 0.8)',
                                borderRadius: 4
                            }, {
                                label: 'SGST (₹)',
                                data: parsed.sgst,
                                backgroundColor: 'rgba(167, 139, 250, 0.8)',
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                x: { stacked: true },
                                y: { stacked: true }
                            },
                            plugins: {
                                tooltip: { mode: 'index', intersect: false }
                            }
                        }
                    });
                }
            }
        </script>
    </div>
</body>

</html>
