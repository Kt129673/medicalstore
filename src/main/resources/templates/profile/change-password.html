<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Change Password', page='profile', content=~{::main}, pageIcon='bi bi-key-fill')}">
<main>
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="d-flex align-items-center mb-4">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                        <i class="bi bi-key-fill fs-4 text-primary"></i>
                    </div>
                    <div>
                        <h4 class="mb-0 fw-bold">Change Password</h4>
                        <p class="text-muted mb-0">Update your account password</p>
                    </div>
                </div>

                <!-- Flash messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/profile/change-password}" method="post" id="changePasswordForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <!-- Current Password -->
                            <div class="mb-3">
                                <label for="currentPassword" class="form-label fw-semibold">
                                    Current Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password" id="currentPassword" name="currentPassword"
                                           class="form-control" required autocomplete="current-password"
                                           placeholder="Enter your current password">
                                    <button class="btn btn-outline-secondary toggle-pw" type="button"
                                            data-target="currentPassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <hr class="my-3">

                            <!-- New Password -->
                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-semibold">
                                    New Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password" id="newPassword" name="newPassword"
                                           class="form-control" required minlength="6"
                                           autocomplete="new-password"
                                           placeholder="At least 6 characters">
                                    <button class="btn btn-outline-secondary toggle-pw" type="button"
                                            data-target="newPassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <!-- Strength meter -->
                                <div class="mt-1">
                                    <div class="progress" style="height:4px;">
                                        <div id="strengthBar" class="progress-bar" style="width:0%;transition:width 0.3s;"></div>
                                    </div>
                                    <small id="strengthLabel" class="text-muted"></small>
                                </div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">
                                    Confirm New Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password" id="confirmPassword" name="confirmPassword"
                                           class="form-control" required minlength="6"
                                           autocomplete="new-password"
                                           placeholder="Re-enter new password">
                                    <button class="btn btn-outline-secondary toggle-pw" type="button"
                                            data-target="confirmPassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div id="matchFeedback" class="mt-1"></div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                    <i class="bi bi-shield-lock me-2"></i>Update Password
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mt-3">
                    <div class="card-body p-3">
                        <h6 class="fw-bold mb-2 text-muted"><i class="bi bi-lightbulb me-1"></i>Password Tips</h6>
                        <ul class="mb-0 text-muted" style="font-size:0.85rem;">
                            <li>Use at least 6 characters</li>
                            <li>Mix uppercase, lowercase, and numbers</li>
                            <li>Avoid using your username or common words</li>
                            <li>Don't reuse passwords from other sites</li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-pw').forEach(btn => {
        btn.addEventListener('click', function() {
            const inp = document.getElementById(this.dataset.target);
            const icon = this.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });
    });

    // Password strength meter
    const newPwInput = document.getElementById('newPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');
    const confirmPwInput = document.getElementById('confirmPassword');
    const matchFeedback = document.getElementById('matchFeedback');

    newPwInput.addEventListener('input', function() {
        const pw = this.value;
        let score = 0;
        if (pw.length >= 6) score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^a-zA-Z0-9]/.test(pw)) score++;

        const levels = [
            { pct: 0,   cls: '',            label: '' },
            { pct: 20,  cls: 'bg-danger',   label: 'Very Weak' },
            { pct: 40,  cls: 'bg-warning',  label: 'Weak' },
            { pct: 60,  cls: 'bg-info',     label: 'Fair' },
            { pct: 80,  cls: 'bg-primary',  label: 'Good' },
            { pct: 100, cls: 'bg-success',  label: 'Strong' }
        ];
        const lvl = levels[score];
        strengthBar.style.width = lvl.pct + '%';
        strengthBar.className = 'progress-bar ' + lvl.cls;
        strengthLabel.textContent = lvl.label;
    });

    // Confirm match feedback
    confirmPwInput.addEventListener('input', function() {
        if (this.value && this.value !== newPwInput.value) {
            matchFeedback.innerHTML = '<small class="text-danger"><i class="bi bi-x-circle me-1"></i>Passwords do not match</small>';
        } else if (this.value) {
            matchFeedback.innerHTML = '<small class="text-success"><i class="bi bi-check-circle me-1"></i>Passwords match</small>';
        } else {
            matchFeedback.innerHTML = '';
        }
    });
    </script>
</main>
</html>
