<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Supplier Form', page='suppliers', content=~{::#content}, pageIcon='bi bi-truck')}">

<body>
    <div id="content">
        <!-- Page Header -->
        <div class="page-header mb-4">
            <div>
                <h2 th:text="${supplier.id != null ? 'Edit Supplier' : 'Add New Supplier'}">
                    <i class="bi bi-truck text-primary"></i> Add Supplier
                </h2>
                <p class="text-muted mb-0">Enter supplier company details and contact information</p>
            </div>
            <a href="/suppliers" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label ent-required">Company Name</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label ent-required">Contact Person</label>
                            <input type="text" class="form-control" th:field="*{contactPerson}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label ent-required">Phone Number</label>
                            <input type="tel" class="form-control" th:field="*{phone}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label ent-required">Address</label>
                            <textarea class="form-control" rows="2" th:field="*{address}" required></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">GST Number</label>
                            <input type="text" class="form-control" th:field="*{gstNumber}"
                                placeholder="22AAAAA0000A1Z5">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm">
                            <i class="bi bi-save"></i> Save
                        </button>
                        <a href="/suppliers" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
