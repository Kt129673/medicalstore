<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='New Credit Record', page='suppliers', content=~{::#content}, pageIcon='bi bi-plus-circle')}">

<body>
    <div id="content">
        <div class="page-header mb-4">
            <div>
                <h2><i class="bi bi-journal-plus text-danger"></i> New Credit Record</h2>
                <p class="text-muted mb-0">Add a new payable balance for a supplier</p>
            </div>
            <a href="/suppliers/credits" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to
                Ledger</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card modern-card">
                    <div class="card-body p-4">
                        <form th:action="@{/suppliers/credits/save}" method="post" th:object="${credit}">
                            <!-- Error Message -->
                            <div th:if="${error}" class="alert alert-danger shadow-sm border-0">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                            </div>

                            <div class="row g-4">
                                <!-- Supplier -->
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Select Supplier *</label>
                                    <select th:field="*{supplier.id}" class="form-select" required>
                                        <option value="" disabled selected>-- Select Supplier --</option>
                                        <option th:each="s : ${suppliers}" th:value="${s.id}"
                                            th:text="${s.name} + ' (' + ${s.contactPhone} + ')'"></option>
                                    </select>
                                </div>

                                <!-- Total Due -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Total Due Amount (₹) *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0">₹</span>
                                        <input type="number" step="0.01" min="1" th:field="*{totalDue}"
                                            class="form-control rounded-end" required>
                                    </div>
                                    <div class="form-text text-muted">The total purchase value or outstanding balance.
                                    </div>
                                </div>

                                <!-- Paid Amount -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Already Paid (₹)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0">₹</span>
                                        <input type="number" step="0.01" min="0" th:field="*{paidAmount}"
                                            class="form-control rounded-end">
                                    </div>
                                    <div class="form-text text-muted">Leave as 0 if entirely unpaid.</div>
                                </div>

                                <!-- Due Date -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Payment Due Date *</label>
                                    <input type="date" th:field="*{dueDate}" class="form-control" required>
                                </div>

                                <hr class="text-muted opacity-25 my-4">

                                <!-- Submit Buttons -->
                                <div class="col-12 text-end">
                                    <button type="reset" class="btn btn-light border me-2"><i
                                            class="bi bi-x-circle"></i> Clear</button>
                                    <button type="submit" class="btn btn-danger"><i class="bi bi-save"></i> Save Credit
                                        Record</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
