<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Suppliers', page='suppliers', content=~{::#content})}">

<body>
    <div id="content">
        <style>
            .supplier-icon {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: 600;
                font-size: 16px;
                margin-right: 12px;
                flex-shrink: 0;
            }

            .gst-badge {
                font-family: monospace;
                background: #e9ecef;
                padding: 4px 8px;
                border-radius: 6px;
                font-size: 12px;
            }
        </style>
        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Suppliers', 'Manage your medicine suppliers and vendors', 'bi bi-building text-primary', '/suppliers/new', 'Add New Supplier', null)}">
        </div>

        <!-- Search Bar -->
        <div th:replace="~{fragments :: search-bar('/suppliers', 'Search by company or contact person...')}"></div>

        <!-- Suppliers Table -->
        <div class="card modern-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> Supplier Directory
                </h5>
                <span class="badge bg-primary" th:text="${suppliers.size()} + ' Suppliers'">0 Suppliers</span>
            </div>
            <div class="card-body">
                <th:block th:if="${suppliers.isEmpty()}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-building', 'No Suppliers Yet', 'Add suppliers to manage your inventory sources', '/suppliers/new', 'Add First Supplier')}">
                    </div>
                </th:block>

                <!-- Table -->
                <div th:unless="${suppliers.isEmpty()}" class="table-responsive">
                    <table class="modern-table table">
                        <thead>
                            <tr>
                                <th><i class="bi bi-building"></i> Company</th>
                                <th><i class="bi bi-person"></i> Contact Person</th>
                                <th><i class="bi bi-telephone"></i> Phone</th>
                                <th><i class="bi bi-envelope"></i> Email</th>
                                <th><i class="bi bi-file-text"></i> GST Number</th>
                                <th class="text-end"><i class="bi bi-tools"></i> Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="supplier : ${suppliers}">
                                <td>
                                    <span style="font-weight: 600;" th:text="${supplier.name}">Company Name</span>
                                </td>
                                <td th:text="${supplier.contactPerson}">Contact Person</td>
                                <td>
                                    <i class="bi bi-telephone-fill" style="color: #667eea; margin-right: 4px;"></i>
                                    <span th:text="${supplier.phone}"></span>
                                </td>
                                <td>
                                    <span th:if="${supplier.email}">
                                        <i class="bi bi-envelope-fill" style="color: #667eea; margin-right: 4px;"></i>
                                        <span th:text="${supplier.email}"></span>
                                    </span>
                                    <span th:unless="${supplier.email}" class="text-muted small">No email</span>
                                </td>
                                <td>
                                    <span th:if="${supplier.gstNumber}" class="gst-badge"
                                        th:text="${supplier.gstNumber}">GST123</span>
                                    <span th:unless="${supplier.gstNumber}" class="text-muted small">N/A</span>
                                </td>
                                <td class="text-end">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/suppliers/edit/{id}(id=${supplier.id})}"
                                            class="btn btn-outline-primary" title="Edit">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/suppliers/delete/{id}(id=${supplier.id})}"
                                            class="btn btn-outline-danger"
                                            onclick="return confirm('Are you sure you want to delete this supplier?')"
                                            title="Delete">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
