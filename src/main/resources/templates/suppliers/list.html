<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Suppliers', page='suppliers', content=~{::#content}, pageIcon='bi bi-truck')}">

<body>
    <div id="content">
        <style>
            .supplier-icon {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: 600;
                font-size: 16px;
                margin-right: 12px;
                flex-shrink: 0;
            }

            .gst-badge {
                font-family: monospace;
                background: #e9ecef;
                padding: 4px 8px;
                border-radius: 6px;
                font-size: 12px;
            }

            [data-theme="dark"] .gst-badge {
                background: #334155;
                color: #f8fafc;
            }
        </style>
        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Suppliers', 'Manage your medicine suppliers and vendors', 'bi bi-building text-primary', '/suppliers/new', 'Add New Supplier', null)}">
        </div>

        <!-- Search Bar -->
        <div th:replace="~{fragments :: search-bar('/suppliers', 'Search by company or contact person...')}"></div>

        <!-- Suppliers Table -->
        <div class="card modern-card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> Supplier Directory
                </h5>
                <span class="badge bg-primary ms-auto" th:text="${suppliers.size()} + ' Suppliers'">0 Suppliers</span>
            </div>
            <div class="card-body">
                <th:block th:if="${suppliers.isEmpty()}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-building text-primary', 'No suppliers yet?', 'Connect with your first supplier to start stocking up!', '/suppliers/new', 'Add First Supplier')}">
                    </div>
                </th:block>

                <!-- Table -->
                <div th:unless="${suppliers.isEmpty()}" class="table-responsive">
                    <table class="modern-table table">
                        <thead>
                            <tr>
                                <th><i class="bi bi-building"></i> Company</th>
                                <th class="d-none d-md-table-cell"><i class="bi bi-person"></i> Contact Person</th>
                                <th><i class="bi bi-telephone"></i> Phone</th>
                                <th class="d-none d-lg-table-cell"><i class="bi bi-envelope"></i> Email</th>
                                <th class="d-none d-sm-table-cell"><i class="bi bi-file-text"></i> GST Number</th>
                                <th class="text-end"><i class="bi bi-tools"></i> Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="supplier : ${suppliers}">
                                <td>
                                    <span style="font-weight: 600;" th:text="${supplier.name}">Company Name</span>
                                </td>
                                <td class="d-none d-md-table-cell" th:text="${supplier.contactPerson}">Contact Person
                                </td>
                                <td>
                                    <i class="bi bi-telephone-fill" style="color: #667eea; margin-right: 4px;"></i>
                                    <span th:text="${supplier.phone}"></span>
                                </td>
                                <td class="d-none d-lg-table-cell">
                                    <span th:if="${supplier.email}">
                                        <i class="bi bi-envelope-fill" style="color: #667eea; margin-right: 4px;"></i>
                                        <span th:text="${supplier.email}"></span>
                                    </span>
                                    <span th:unless="${supplier.email}" class="text-muted small">No email</span>
                                </td>
                                <td class="d-none d-sm-table-cell">
                                    <span th:if="${supplier.gstNumber}" class="gst-badge"
                                        th:text="${supplier.gstNumber}">GST123</span>
                                    <span th:unless="${supplier.gstNumber}" class="text-muted small">N/A</span>
                                </td>
                                <td class="text-end">
                                    <div class="btn-group btn-group-sm">
                                        <button type="button" class="btn btn-outline-info" title="View Details"
                                            th:onclick="viewSupplier([[${supplier.name}]], [[${supplier.contactPerson}]], [[${supplier.phone}]], [[${supplier.email}]], [[${supplier.address}]], [[${supplier.gstNumber}]])">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <a th:href="@{/suppliers/edit/{id}(id=${supplier.id})}"
                                            class="btn btn-outline-primary" title="Edit">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/suppliers/delete/{id}(id=${supplier.id})}"
                                            class="btn btn-outline-danger"
                                            onclick="return confirmLink(event, this, 'Are you sure you want to delete this supplier? This action cannot be undone.', 'Yes, Delete!', 'Delete Supplier?')"
                                            title="Delete"
                                            sec:authorize="hasRole('ADMIN')">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Supplier Details Modal -->
        <div class="modal fade" id="viewSupplierModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold"><i class="bi bi-building text-primary me-2"></i>Supplier Details
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3"
                                style="width: 80px; height: 80px;">
                                <i class="bi bi-truck fs-1"></i>
                            </div>
                            <h4 class="fw-bold mb-1" id="s_name">Company Name</h4>
                            <span class="badge bg-secondary" id="s_gst">N/A</span>
                        </div>
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <div class="p-3 bg-light rounded h-100">
                                    <small class="text-muted d-block mb-1">Contact Person</small>
                                    <span class="fw-semibold" id="s_contact">N/A</span>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="p-3 bg-light rounded h-100">
                                    <small class="text-muted d-block mb-1">Phone</small>
                                    <span class="fw-semibold text-primary" id="s_phone">N/A</span>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="p-3 bg-light rounded">
                                    <small class="text-muted d-block mb-1">Email</small>
                                    <span class="fw-semibold" id="s_email">N/A</span>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="p-3 bg-light rounded">
                                    <small class="text-muted d-block mb-1">Address</small>
                                    <span class="fw-semibold" id="s_address">N/A</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 pt-0">
                        <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function viewSupplier(name, contact, phone, email, address, gst) {
                document.getElementById('s_name').textContent = name || 'N/A';
                document.getElementById('s_contact').textContent = contact || 'N/A';
                document.getElementById('s_phone').textContent = phone || 'N/A';
                document.getElementById('s_email').textContent = email || 'N/A';
                document.getElementById('s_address').textContent = address || 'N/A';
                document.getElementById('s_gst').textContent = gst || 'N/A';

                new bootstrap.Modal(document.getElementById('viewSupplierModal')).show();
            }
        </script>
    </div>
</body>

</html>
