<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(title='Suppliers', page='suppliers', content=~{::#content}, pageIcon='bi bi-truck')}">

<body>
    <div id="content">

        <!-- Read-Only Monitoring Mode: shown to ADMIN drilling down into operations -->
        <div sec:authorize="hasRole('ADMIN')"
             class="alert alert-info d-flex align-items-center gap-2 mb-3" role="alert">
            <i class="bi bi-eye-fill fs-5 flex-shrink-0"></i>
            <div>
                <strong>Read-Only Monitoring Mode.</strong>
                You are viewing operational data as Platform Admin. Write operations are restricted to Shopkeeper.
            </div>
        </div>

        <!-- Page Header -->
        <div
            th:replace="~{fragments :: page-header('Suppliers', 'Manage your medicine suppliers and vendors', 'bi bi-building text-primary', '/suppliers/new', 'Add New Supplier', null)}">
        </div>

        <!-- Search Bar -->
        <div th:replace="~{fragments :: search-bar('/suppliers', 'Search by company or contact person...')}"></div>

        <!-- Suppliers Table -->
        <div class="card modern-card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> Supplier Directory
                </h5>
                <span class="badge bg-primary ms-auto" th:text="${suppliers.size()} + ' Suppliers'">0 Suppliers</span>
            </div>
            <div class="card-body">
                <th:block th:if="${suppliers.isEmpty()}">
                    <div
                        th:replace="~{fragments :: empty-state('bi bi-building text-primary', 'No suppliers yet?', 'Connect with your first supplier to start stocking up!', '/suppliers/new', 'Add First Supplier')}">
                    </div>
                </th:block>

                <!-- Table -->
                <div th:unless="${suppliers.isEmpty()}" class="table-responsive">
                    <table class="modern-table table table-animate-rows table-sticky-right">
                        <thead>
                            <tr>
                                <th><i class="bi bi-building"></i> Company</th>
                                <th class="d-none d-md-table-cell"><i class="bi bi-person"></i> Contact Person</th>
                                <th><i class="bi bi-telephone"></i> Phone</th>
                                <th class="d-none d-lg-table-cell"><i class="bi bi-envelope"></i> Email</th>
                                <th class="d-none d-sm-table-cell"><i class="bi bi-file-text"></i> GST Number</th>
                                <th class="text-end"><i class="bi bi-tools"></i> Actions</th>
                            </tr>
                        </thead>
                        <tbody id="suppSkeletonBody" aria-hidden="true">
                            <tr class="ent-skeleton--row" th:each="i : ${#numbers.sequence(1,5)}">
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:140px;"></span></td>
                                <td class="d-none d-md-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:110px;"></span></td>
                                <td><span class="ent-skeleton ent-skeleton--text" style="width:100px;"></span></td>
                                <td class="d-none d-lg-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:130px;"></span></td>
                                <td class="d-none d-sm-table-cell"><span class="ent-skeleton ent-skeleton--text" style="width:110px;"></span></td>
                                <td class="text-end"><div class="d-flex gap-1 justify-content-end"><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span><span class="ent-skeleton" style="width:32px;height:32px;border-radius:6px;display:inline-block;"></span></div></td>
                            </tr>
                        </tbody>
                        <tbody id="suppTableBody" style="display:none">
                            <tr th:each="supplier : ${suppliers}">
                                <td>
                                    <span class="fw-semibold" th:text="${supplier.name}">Company Name</span>
                                </td>
                                <td class="d-none d-md-table-cell" th:text="${supplier.contactPerson}">Contact Person
                                </td>
                                <td>
                                    <i class="bi bi-telephone-fill text-primary me-1"></i>
                                    <span th:text="${supplier.phone}"></span>
                                </td>
                                <td class="d-none d-lg-table-cell">
                                    <span th:if="${supplier.email}">
                                        <i class="bi bi-envelope-fill text-primary me-1"></i>
                                        <span th:text="${supplier.email}"></span>
                                    </span>
                                    <span th:unless="${supplier.email}" class="text-muted small">No email</span>
                                </td>
                                <td class="d-none d-sm-table-cell">
                                    <span th:if="${supplier.gstNumber}" class="gst-badge"
                                        th:text="${supplier.gstNumber}">GST123</span>
                                    <span th:unless="${supplier.gstNumber}" class="text-muted small">N/A</span>
                                </td>
                                <td class="text-end">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/suppliers/{id}(id=${supplier.id})}"
                                            class="btn btn-outline-info" title="View Details">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/suppliers/edit/{id}(id=${supplier.id})}"
                                            class="btn btn-outline-primary" title="Edit" sec:authorize="hasRole('SHOPKEEPER')">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form method="post" th:action="@{/suppliers/delete/{id}(id=${supplier.id})}" style="display:inline"
                                              data-confirm-delete="Are you sure you want to delete this supplier? This action cannot be undone."
                                              sec:authorize="hasRole('ADMIN')">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline-danger" title="Delete">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var sk = document.getElementById('suppSkeletonBody');
                    var rb = document.getElementById('suppTableBody');
                    if (!sk || !rb) return;
                    setTimeout(function () { sk.style.display = 'none'; rb.style.display = ''; }, 230);
                });
                </script>
            </div>
        </div>


    </div>
</body>

</html>
