<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Reusable Page Header Fragment -->
<div th:fragment="page-header(headerTitle, headerDescription, headerIcon, actionUrl, actionText, actionClass)"
    class="page-header mb-4">
    <div>
        <h2>
            <i th:class="${headerIcon}"></i> <span th:text="${headerTitle}">Title</span>
        </h2>
        <p class="text-muted mb-0" th:text="${headerDescription}">Description</p>
    </div>
    <a th:if="${actionUrl}" th:href="${actionUrl}" th:class="${actionClass ?: 'btn btn-primary'}">
        <i class="bi bi-plus-circle"></i> <span th:text="${actionText}">Action</span>
    </a>
</div>

<!-- Reusable Empty State Fragment -->
<div th:fragment="empty-state(iconClass, title, message, actionUrl, actionText)">
    <div class="text-center py-5">
        <div class="empty-state-icon">
            <i th:class="${iconClass}"></i>
        </div>
        <h4 class="fw-bold mb-3" th:text="${title}">No Data Found</h4>
        <p th:text="${message}">No items found</p>
        <a th:if="${actionUrl}" th:href="${actionUrl}" class="btn btn-primary mt-2">
            <i class="bi bi-plus-circle"></i> <span th:text="${actionText}">Add</span>
        </a>
    </div>
</div>

<!-- Reusable Search Bar Fragment -->
<div th:fragment="search-bar(searchAction, searchPlaceholder)">
    <form th:action="${searchAction}" method="get" class="mb-4">
        <div class="input-group search-group-transition search-inline-max">
            <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" name="search" class="form-control border-start-0 ps-0 shadow-none"
                th:placeholder="${searchPlaceholder}" th:value="${param.search}">
            <button class="btn btn-primary px-4" type="submit">Search</button>
        </div>
    </form>
</div>

</html>
