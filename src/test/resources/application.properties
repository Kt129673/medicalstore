# ── Test configuration — uses H2 in-memory database instead of MySQL ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Thymeleaf cache for tests
spring.thymeleaf.cache=false

# Disable Twilio in tests
twilio.whatsapp.enabled=false
twilio.account.sid=TEST_SID
twilio.auth.token=TEST_TOKEN
twilio.phone.number=+10000000000

# Disable second-level cache in tests
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.cache.type=none

# Test remember-me key
remember.me.key=test-remember-me-key
